<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 2026 World Cup Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8fafc, #e0f2fe);
            color: #1e2937;
            font-size: 1.05rem;
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(90deg, #22c55e, #eab308);
            color: #0f172a;
            padding: 20px 30px;
            text-align: center;
        }
        h1 { font-size: 2.1rem; font-weight: 900; }
        .progress {
            height: 8px;
            background: #eab308;
            transition: width 0.4s;
        }
        .content { padding: 30px; }

        .match-popup {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .popup-content {
            background: white;
            border-radius: 24px;
            padding: 40px 50px;
            width: 90%;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        .team-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 20px 0;
            font-size: 1.35rem;
            font-weight: 700;
        }
        .team-flag {
            width: 52px;
            height: 34px;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.15);
        }
        input[type="number"] {
            width: 80px;
            height: 60px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 800;
            border: 4px solid #eab308;
            border-radius: 16px;
        }
        button {
            margin-top: 25px;
            padding: 14px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
        }
        .btn-next { background: #22c55e; color: white; }
        .btn-skip { background: #64748b; color: white; }

        .group-card, .standings {
            background: #f8fafc;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .standings table {
            width: 100%;
            border-collapse: collapse;
        }
        .standings th, .standings td {
            padding: 10px;
            text-align: left;
        }
        .standings th { background: #ecfdf5; }
        .qualified { background: #d1fae5; font-weight: 700; }

        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏆 2026 World Cup Predictor</h1>
        <p>Predict one match at a time • Real schedule order</p>
        <div style="height:8px; background:#eab308; margin-top:12px;" id="overallProgress"></div>
    </div>

    <div class="content">
        <div id="mainScreen">
            <div style="text-align:center; margin-bottom:30px;">
                <button onclick="startPredicting()" class="btn-next" style="padding:16px 50px; font-size:1.4rem;">
                    🚀 Start Predicting Matches
                </button>
            </div>

            <div id="standingsOverview" class="standings"></div>
        </div>
    </div>
</div>

<!-- Match Popup -->
<div id="matchPopup" class="match-popup">
    <div class="popup-content">
        <h2 id="matchTitle" style="margin-bottom:20px; color:#1e40af;">Match X</h2>
        
        <div id="homeTeam" class="team-row">
            <div><img id="homeFlag" class="team-flag" src=""> <span id="homeName"></span></div>
            <input id="homeScore" type="number" min="0" value="1">
        </div>
        
        <div style="font-size:2.5rem; color:#eab308; font-weight:900;">VS</div>
        
        <div id="awayTeam" class="team-row">
            <input id="awayScore" type="number" min="0" value="1">
            <div><img id="awayFlag" class="team-flag" src=""> <span id="awayName"></span></div>
        </div>

        <div>
            <button onclick="submitMatchScore()" class="btn-next">✅ Save Score & Next Match</button>
            <button onclick="closePopup()" class="btn-skip" style="margin-left:15px;">Skip for now</button>
        </div>
    </div>
</div>

<script>
    // Groups (same as before)
    const GROUPS = {
        A: ["Mexico", "South Africa", "South Korea", "Czechia"],
        B: ["Canada", "Bosnia and Herzegovina", "Qatar", "Switzerland"],
        C: ["Brazil", "Morocco", "Haiti", "Scotland"],
        D: ["United States", "Paraguay", "Australia", "Turkey"],
        E: ["Germany", "Curacao", "Ivory Coast", "Ecuador"],
        F: ["Netherlands", "Japan", "Sweden", "Tunisia"],
        G: ["Belgium", "Egypt", "Iran", "New Zealand"],
        H: ["Spain", "Cape Verde", "Saudi Arabia", "Uruguay"],
        I: ["France", "Senegal", "Iraq", "Norway"],
        J: ["Argentina", "Algeria", "Austria", "Jordan"],
        K: ["Portugal", "DR Congo", "Uzbekistan", "Colombia"],
        L: ["England", "Croatia", "Ghana", "Panama"]
    };

    const flagMap = { /* same mapping as previous versions */ 
        "Mexico":"mx","South Africa":"za","South Korea":"kr","Czechia":"cz",
        "Canada":"ca","Bosnia and Herzegovina":"ba","Qatar":"qa","Switzerland":"ch",
        "Brazil":"br","Morocco":"ma","Haiti":"ht","Scotland":"gb-sct",
        "United States":"us","Paraguay":"py","Australia":"au","Turkey":"tr",
        "Germany":"de","Curacao":"cw","Ivory Coast":"ci","Ecuador":"ec",
        "Netherlands":"nl","Japan":"jp","Sweden":"se","Tunisia":"tn",
        "Belgium":"be","Egypt":"eg","Iran":"ir","New Zealand":"nz",
        "Spain":"es","Cape Verde":"cv","Saudi Arabia":"sa","Uruguay":"uy",
        "France":"fr","Senegal":"sn","Iraq":"iq","Norway":"no",
        "Argentina":"ar","Algeria":"dz","Austria":"at","Jordan":"jo",
        "Portugal":"pt","DR Congo":"cd","Uzbekistan":"uz","Colombia":"co",
        "England":"gb-eng","Croatia":"hr","Ghana":"gh","Panama":"pa"
    };

    function getFlagUrl(team) {
        const code = flagMap[team] || "xx";
        if (code === "gb-sct") return "https://flagcdn.com/w60/gb-sct.png";
        if (code === "gb-eng") return "https://flagcdn.com/w60/gb-eng.png";
        return `https://flagcdn.com/w60/${code}.png`;
    }

    let allMatches = [];
    let currentMatchIndex = 0;
    let matchScores = {}; // group -> array of matches

    // Build list of all group matches in approximate real schedule order (first few days shown)
    function buildMatchList() {
        allMatches = [];
        // Early matches from real schedule (June 11-13 etc.)
        // Group A
        allMatches.push({group:"A", home:0, away:1}); // Mexico vs South Africa
        allMatches.push({group:"A", home:2, away:3}); // South Korea vs Czechia
        // Group B
        allMatches.push({group:"B", home:0, away:1}); // Canada vs Bosnia
        // Group D
        allMatches.push({group:"D", home:0, away:1}); // USA vs Paraguay
        // Group C
        allMatches.push({group:"C", home:2, away:3}); // Haiti vs Scotland (example order)
        allMatches.push({group:"C", home:0, away:1}); // Brazil vs Morocco
        allMatches.push({group:"B", home:2, away:3}); // Qatar vs Switzerland

        // Add remaining matches for all groups
        for (let g of Object.keys(GROUPS)) {
            const teams = GROUPS[g];
            for (let i = 0; i < 4; i++) {
                for (let j = i+1; j < 4; j++) {
                    const alreadyAdded = allMatches.some(m => m.group === g && 
                        ((m.home === i && m.away === j) || (m.home === j && m.away === i)));
                    if (!alreadyAdded) {
                        allMatches.push({group: g, home: i, away: j});
                    }
                }
            }
        }
    }

    function initScores() {
        matchScores = {};
        for (let g of Object.keys(GROUPS)) {
            matchScores[g] = [];
            const teams = GROUPS[g];
            for (let i = 0; i < 4; i++) {
                for (let j = i+1; j < 4; j++) {
                    matchScores[g].push({homeIdx:i, awayIdx:j, homeScore:1, awayScore:1});
                }
            }
        }
    }

    function computeStandings() {
        // same as before - returns standings object
        let standings = {};
        for (let g in GROUPS) {
            let teams = GROUPS[g];
            let stats = teams.map((t,idx) => ({team:t, pts:0, gf:0, ga:0, gd:0}));
            for (let m of matchScores[g]) {
                let home = stats[m.homeIdx];
                let away = stats[m.awayIdx];
                let hs = m.homeScore, as = m.awayScore;
                home.gf += hs; home.ga += as;
                away.gf += as; away.ga += hs;
                if (hs > as) home.pts += 3;
                else if (as > hs) away.pts += 3;
                else { home.pts +=1; away.pts +=1; }
            }
            stats.forEach(s => s.gd = s.gf - s.ga);
            stats.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
            standings[g] = stats;
        }
        return standings;
    }

    function renderStandingsOverview() {
        const container = document.getElementById('standingsOverview');
        const standings = computeStandings();
        let html = '<h2 style="margin-bottom:15px;">Current Standings</h2>';
        for (let g in standings) {
            html += `<div class="group-card"><strong>Group ${g}</strong><table class="standings"><thead><tr><th>Team</th><th>Pts</th><th>GD</th></tr></thead><tbody>`;
            standings[g].forEach((t,i) => {
                const cls = i < 2 ? 'qualified' : '';
                html += `<tr class="${cls}"><td><img src="${getFlagUrl(t.team)}" class="team-flag" style="width:32px;"> ${t.team}</td><td>${t.pts}</td><td>${t.gd}</td></tr>`;
            });
            html += '</tbody></table></div>';
        }
        container.innerHTML = html;
    }

    function showNextMatch() {
        if (currentMatchIndex >= allMatches.length) {
            alert("All group matches completed! Moving to Knockout Stage.");
            // TODO: go to knockout
            return;
        }

        const match = allMatches[currentMatchIndex];
        const teams = GROUPS[match.group];
        const homeTeam = teams[match.home];
        const awayTeam = teams[match.away];

        document.getElementById('matchTitle').textContent = `Group ${match.group} Match`;
        document.getElementById('homeName').textContent = homeTeam;
        document.getElementById('awayName').textContent = awayTeam;
        document.getElementById('homeFlag').src = getFlagUrl(homeTeam);
        document.getElementById('awayFlag').src = getFlagUrl(awayTeam);

        // Pre-fill current scores if already set
        const existing = matchScores[match.group].find(m => m.homeIdx === match.home && m.awayIdx === match.away);
        if (existing) {
            document.getElementById('homeScore').value = existing.homeScore;
            document.getElementById('awayScore').value = existing.awayScore;
        }

        document.getElementById('matchPopup').style.display = 'flex';
    }

    function submitMatchScore() {
        const match = allMatches[currentMatchIndex];
        const homeScore = parseInt(document.getElementById('homeScore').value) || 0;
        const awayScore = parseInt(document.getElementById('awayScore').value) || 0;

        // Save score
        const matchObj = matchScores[match.group].find(m => m.homeIdx === match.home && m.awayIdx === match.away);
        if (matchObj) {
            matchObj.homeScore = homeScore;
            matchObj.awayScore = awayScore;
        }

        closePopup();
        currentMatchIndex++;
        updateProgress();
        renderStandingsOverview();
        showNextMatch();
    }

    function closePopup() {
        document.getElementById('matchPopup').style.display = 'none';
    }

    function updateProgress() {
        const percent = Math.round((currentMatchIndex / allMatches.length) * 100);
        document.getElementById('overallProgress').style.width = percent + '%';
    }

    function startPredicting() {
        currentMatchIndex = 0;
        buildMatchList();
        initScores();
        updateProgress();
        renderStandingsOverview();
        showNextMatch();
    }

    // Initial load
    renderStandingsOverview();
</script>
</body>
</html>
