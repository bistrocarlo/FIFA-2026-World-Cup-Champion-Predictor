<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏆 FIFA World Cup 2026 Live Simulator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a1f2e 0%, #0c2a3b 100%);
      min-height: 100vh;
      padding: 24px;
      color: #f0f4fa;
    }

    .container {
      max-width: 1600px;
      margin: 0 auto;
      background: rgba(255,255,255,0.97);
      border-radius: 48px;
      padding: 32px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.3);
      backdrop-filter: blur(2px);
      transition: all 0.3s;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 4px solid #f5c542;
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    .logo-area {
      display: flex;
      flex-direction: column;
    }
    .fifa-logo {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #e31c25, #f5c542, #0033a0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .worldcup-title {
      font-size: 2.4rem;
      font-weight: 800;
      line-height: 1.2;
    }
    .worldcup-title .fifa { color: #0033a0; }
    .worldcup-title .year { color: #f5c542; }
    .hosts {
      background: #fef5e0;
      color: #c0392b;
      padding: 6px 18px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.9rem;
      margin-top: 8px;
      display: inline-block;
    }

    button {
      border: none;
      border-radius: 60px;
      padding: 12px 28px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.95rem;
      margin: 5px;
    }
    button:hover { transform: translateY(-3px); filter: brightness(0.96); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    .green { background: #1f7b4d; color: white; }
    .orange { background: #e67e22; color: white; }
    .blue { background: #0033a0; color: white; }
    .gray { background: #5a6e7c; color: white; }
    .gold { background: #f5c542; color: #1e2f47; }

    .note {
      background: #fff3df;
      border-left: 8px solid #f5c542;
      border-radius: 28px;
      padding: 18px 24px;
      margin-bottom: 30px;
      color: #1e3a5f;
      font-weight: 600;
      text-align: center;
    }

    /* progress bar */
    .progress-container {
      background: #e2e8f0;
      border-radius: 40px;
      height: 16px;
      margin: 20px 0;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, #f5c542, #e31c25);
      width: 0%;
      height: 100%;
      transition: width 0.5s ease;
      border-radius: 40px;
    }
    .progress-text {
      text-align: center;
      font-weight: 700;
      margin-bottom: 10px;
    }

    /* match card */
    .match-simulator {
      background: linear-gradient(145deg, #ffffff, #fef9ef);
      border-radius: 48px;
      padding: 32px;
      margin: 25px 0;
      box-shadow: 0 20px 35px rgba(0,0,0,0.1);
      border: 1px solid #f5d471;
    }
    .match-header {
      text-align: center;
      font-weight: 800;
      font-size: 1.2rem;
      background: #0033a0;
      display: inline-block;
      padding: 8px 28px;
      border-radius: 60px;
      color: white;
      margin-bottom: 25px;
      width: auto;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 5px 0 #001a55;
    }
    .teams-sim {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px;
      flex-wrap: wrap;
    }
    .team-sim {
      text-align: center;
      background: #f8fafd;
      padding: 20px;
      border-radius: 48px;
      min-width: 220px;
      transition: all 0.2s;
    }
    .flag-sim {
      width: 80px;
      height: 55px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.2);
      margin-bottom: 12px;
    }
    .team-sim span {
      font-weight: 800;
      font-size: 1.2rem;
      display: block;
      margin: 12px 0;
    }
    .score-select {
      border: 2px solid #f5c542;
      border-radius: 60px;
      padding: 12px 16px;
      font-size: 1.2rem;
      font-weight: 800;
      background: white;
      cursor: pointer;
      width: 100px;
      text-align: center;
      margin-top: 8px;
    }
    .vs-icon {
      font-size: 2.2rem;
      font-weight: 900;
      color: #f5c542;
      text-shadow: 2px 2px 0 #b87c00;
    }

    /* standings grid */
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 28px;
      margin-top: 40px;
    }
    .group-card {
      background: #ffffff;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 15px 30px rgba(0,0,0,0.08);
      transition: 0.2s;
      border: 1px solid #ffe1a0;
    }
    .group-title {
      background: linear-gradient(95deg, #0033a0, #1e4ba0);
      color: white;
      padding: 14px 20px;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .standings-table {
      width: 100%;
      border-collapse: collapse;
    }
    .standings-table th {
      background: #fef5e0;
      color: #7a5a07;
      padding: 12px 8px;
      font-size: 0.75rem;
      text-align: center;
    }
    .standings-table td {
      padding: 10px 6px;
      text-align: center;
      border-bottom: 1px solid #ffeac2;
      font-weight: 500;
    }
    .team-name-cell {
      text-align: left;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .qualified-row {
      background: #e0f7e8;
      font-weight: 800;
      color: #0f5c2d;
    }
    .third-qualified {
      background: #e3f0ff;
      font-weight: 800;
      color: #0033a0;
    }
    .rank-1, .rank-2, .rank-3 {
      position: relative;
    }
    .medal {
      font-size: 1rem;
      margin-left: 4px;
    }

    /* knockout */
    .ko-match {
      background: #ffffff;
      border-radius: 28px;
      padding: 16px;
      margin-bottom: 16px;
      border-left: 6px solid #f5c542;
    }
    .winner-btn {
      background: #f0f2f5;
      border: 2px solid #f5c542;
      border-radius: 60px;
      padding: 8px 24px;
      font-weight: 800;
      cursor: pointer;
    }
    .winner-btn.active {
      background: #f5c542;
      color: #1e2f47;
    }
    .hidden { display: none; }
    .champion-box, .third-place-box {
      border-radius: 60px;
      text-align: center;
      padding: 18px;
      font-weight: 800;
    }
    .champion-box {
      background: linear-gradient(135deg, #f5c542, #ffdd88);
      color: #1e3a5f;
      font-size: 1.6rem;
    }
    .third-place-box {
      background: #cbdde6;
      font-size: 1.2rem;
      margin-top: 15px;
    }
    @media (max-width: 700px) {
      .teams-sim { gap: 15px; }
      .team-sim { min-width: 160px; }
      .groups-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

    <div id="liveStandings" class="groups-grid"></div>

    <div id="knockoutContainer"></div>

</div>

    for(let g of GROUP_KEYS) {
      groupScores[g] = schedule[g].map(m => ({ ...m, homeScore:0, awayScore:0 }));
    }
  }
  buildFullSchedule();

  // Flatten matches in chronological order
  let allMatches = [];
  function flattenMatches() {
    allMatches = [];
    GROUP_KEYS.forEach(g => {
      groupScores[g].forEach(m => allMatches.push({ group: g, ...m }));
    });
    allMatches.sort((a,b) => a.matchNo - b.matchNo);
  }
  flattenMatches();

  let currentMatchIdx = 0;
  let knockoutData = null;

  // Helper dropdown options
  function dropdownOptions(selected) {
    let opts = '';
    for(let i=0; i<=10; i++) opts += `<option value="${i}" ${selected==i ? 'selected':''}>${i}</option>`;
    return opts;
  }

  // compute standings
  function computeStandings() {
    let standings = {};
    for(let g of GROUP_KEYS) {
      let teams = GROUPS[g];
      let stats = teams.map((team,idx) => ({ team, idx, pts:0, gf:0, ga:0, gd:0, played:0, wins:0, draws:0, losses:0 }));
      for(let m of groupScores[g]) {
        let home = stats[m.homeIdx], away = stats[m.awayIdx];
        let hs = Number(m.homeScore)||0, as = Number(m.awayScore)||0;
        home.gf += hs; home.ga += as; away.gf += as; away.ga += hs;
        home.played++; away.played++;
        if(hs > as) { home.pts+=3; home.wins++; away.losses++; }
        else if(as > hs) { away.pts+=3; away.wins++; home.losses++; }
        else { home.pts+=1; away.pts+=1; home.draws++; away.draws++; }
      }
      stats.forEach(s => s.gd = s.gf - s.ga);
      stats.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
      standings[g] = stats;
    }
    return standings;
  }

  // render current match with dropdowns
  function renderCurrentMatch() {

      return;
    }
    const m = allMatches[currentMatchIdx];
    const homeTeam = GROUPS[m.group][m.homeIdx];
    const awayTeam = GROUPS[m.group][m.awayIdx];
    const homeScoreVal = m.homeScore;
    const awayScoreVal = m.awayScore;
    const html = `
      <div class="match-header">🎯 MATCH ${m.matchNo} • ${m.date} • ${m.city} • ${m.stadium}</div>
      <div class="teams-sim">
        <div class="team-sim">
          <img class="flag-sim" src="${getFlagUrl(homeTeam)}">
          <span>${homeTeam}</span>
          <select id="homeScoreSelect" class="score-select">
            ${dropdownOptions(homeScoreVal)}
          </select>
        </div>
        <div class="vs-icon">⚡ VS ⚡</div>
        <div class="team-sim">
          <img class="flag-sim" src="${getFlagUrl(awayTeam)}">
          <span>${awayTeam}</span>
          <select id="awayScoreSelect" class="score-select">
            ${dropdownOptions(awayScoreVal)}
          </select>
        </div>
      </div>
    `;
    document.getElementById("currentMatchContainer").innerHTML = html;
    // attach events
    document.getElementById("homeScoreSelect").addEventListener("change", (e) => {
      m.homeScore = parseInt(e.target.value);
      renderLiveStandings();
    });
    document.getElementById("awayScoreSelect").addEventListener("change", (e) => {
      m.awayScore = parseInt(e.target.value);
      renderLiveStandings();
    });
  }

  // beautiful standings render
  function renderLiveStandings() {
    const standings = computeStandings();
    let groupsHtml = "";
    for(let g of GROUP_KEYS) {
      let rows = standings[g];
      groupsHtml += `<div class="group-card"><div class="group-title">Group ${g}</div>
      <table class="standings-table"><thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GF</th><th>GA</th><th>GD</th><th>Pts</th></tr></thead><tbody>`;
      rows.forEach((row, idx) => {
        let medal = idx===0 ? "🥇" : (idx===1 ? "🥈" : (idx===2 ? "🥉" : ""));
        let cls = "";
        if(idx===0 || idx===1) cls = "qualified-row";
        else if(idx===2) cls = "third-qualified";
        groupsHtml += `<tr class="${cls}"><td>${medal}</td><td class="team-name-cell"><img class="flag" src="${getFlagUrl(row.team)}" style="width:24px;height:16px;">${row.team}</td>
        <td>${row.played}</td><td>${row.wins}</td><td>${row.draws}</td><td>${row.losses}</td>
        <td>${row.gf}</td><td>${row.ga}</td><td>${row.gd}</td><td><strong>${row.pts}</strong></td></tr>`;
      });
      groupsHtml += `</tbody></table></div>`;
    }
    document.getElementById("liveStandings").innerHTML = groupsHtml;
    const played = currentMatchIdx;
    document.getElementById("progressCounter").innerText = played;
    document.getElementById("totalMatches").innerText = allMatches.length;
    document.getElementById("progressFill").style.width = `${(played/allMatches.length)*100}%`;
  }

  // actions
  document.getElementById("nextMatchBtn").onclick = () => {
    if(currentMatchIdx < allMatches.length) currentMatchIdx++;
    renderCurrentMatch();
    renderLiveStandings();
  };
  document.getElementById("randomResultBtn").onclick = () => {
    if(currentMatchIdx < allMatches.length) {
      const m = allMatches[currentMatchIdx];
      m.homeScore = Math.floor(Math.random()*6);
      m.awayScore = Math.floor(Math.random()*6);
      renderCurrentMatch();
      renderLiveStandings();
    }
  };
  document.getElementById("autoCompleteBtn").onclick = () => {
    for(let i=currentMatchIdx; i<allMatches.length; i++) {
      allMatches[i].homeScore = Math.floor(Math.random()*4);
      allMatches[i].awayScore = Math.floor(Math.random()*4);
    }
    currentMatchIdx = allMatches.length;
    renderCurrentMatch();
    renderLiveStandings();
    document.getElementById("toKnockoutBtn").style.display = "inline-block";
  };
  document.getElementById("resetBtn").onclick = () => location.reload();

  // Knockout logic (winner picks, third place)
  function getQualifiedTeams(standings) {
    let thirds = [];
    for(let g of GROUP_KEYS) thirds.push({...standings[g][2], group:g});
    thirds.sort((a,b)=>b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
    let best8 = thirds.slice(0,8);
    let bestGroups = new Set(best8.map(t=>t.group));
    let qualified = [];
    for(let g of GROUP_KEYS) {
      qualified.push({...standings[g][0], group:g});
      qualified.push({...standings[g][1], group:g});
      if(bestGroups.has(g)) qualified.push({...standings[g][2], group:g});
    }
    qualified.sort((a,b)=>b.pts-a.pts || b.gd-a.gd || b.gf-a.gf);
    return qualified;
  }
  // build knockout
  function buildKnockout(qualified) {
    let r32 = [];
    for(let i=0;i<16;i++) r32.push({team1:qualified[i], team2:qualified[31-i], winner:null});
    let r16 = Array(8).fill().map(()=>({team1:null,team2:null,winner:null}));
    let qf = Array(4).fill().map(()=>({team1:null,team2:null,winner:null}));
    let sf = Array(2).fill().map(()=>({team1:null,team2:null,winner:null}));
    let third = {team1:null,team2:null,winner:null};
    let final = {team1:null,team2:null,winner:null};
    return {r32, r16, qf, sf, third, final};
  }
  function propagate(k) {
    let w32 = k.r32.map(m => m.winner===1?m.team1:(m.winner===2?m.team2:null));
    k.r16.forEach((m,i)=>{ m.team1 = w32[i*2]; m.team2 = w32[i*2+1]; if(!m.team1||!m.team2) m.winner=null; });
    let w16 = k.r16.map(m=> m.winner===1?m.team1:(m.winner===2?m.team2:null));
    k.qf.forEach((m,i)=>{ m.team1 = w16[i*2]; m.team2 = w16[i*2+1]; });
    let wqf = k.qf.map(m=> m.winner===1?m.team1:(m.winner===2?m.team2:null));
    k.sf.forEach((m,i)=>{ m.team1 = wqf[i*2]; m.team2 = wqf[i*2+1]; });
    let wsf = k.sf.map(m=> m.winner===1?m.team1:(m.winner===2?m.team2:null));
    let lsf = k.sf.map(m=> m.winner===1?m.team2:(m.winner===2?m.team1:null));
    k.third.team1 = lsf[0]; k.third.team2 = lsf[1];
    k.final.team1 = wsf[0]; k.final.team2 = wsf[1];
  }
  function renderKnockoutUI(k) {
    let html = "";
    function renderMatch(m, idx, roundName) {
      if(!m) return "";
      let t1 = m.team1, t2 = m.team2;
      return `<div class="ko-match"><div class="ko-top">${roundName} ${idx+1}</div><div class="ko-buttons">
        <button class="winner-btn ${m.winner===1?'active':''}" data-round="${roundName}" data-idx="${idx}" data-choice="1">${t1?`<img class="flag" src="${getFlagUrl(t1.team)}" style="width:22px;"> ${t1.team}`:'—'}</button>
        <span>VS</span>
        <button class="winner-btn ${m.winner===2?'active':''}" data-round="${roundName}" data-idx="${idx}" data-choice="2">${t2?`<img class="flag" src="${getFlagUrl(t2.team)}" style="width:22px;"> ${t2.team}`:'—'}</button>
      </div></div>`;
    }
    html += "<div class='round-title'>🏆 ROUND OF 32</div>" + k.r32.map((m,i)=>renderMatch(m,i,"r32")).join("");
    html += "<div class='round-title'>🔹 ROUND OF 16</div>" + k.r16.map((m,i)=>renderMatch(m,i,"r16")).join("");
    html += "<div class='round-title'>🔸 QUARTER-FINALS</div>" + k.qf.map((m,i)=>renderMatch(m,i,"qf")).join("");
    html += "<div class='round-title'>⚡ SEMI-FINALS</div>" + k.sf.map((m,i)=>renderMatch(m,i,"sf")).join("");
    html += "<div class='round-title'>🥉 THIRD PLACE</div>" + renderMatch(k.third,0,"third");
    html += "<div class='round-title'>🏆 FINAL</div>" + renderMatch(k.final,0,"final");
    if(k.final.winner) html += `<div class="champion-box">🏆 WORLD CHAMPION: ${k.final.winner.team} 🏆</div>`;
    if(k.third.winner) html += `<div class="third-place-box">🥉 Third place: ${k.third.winner.team}</div>`;
    document.getElementById("knockoutContainer").innerHTML = html;
    document.querySelectorAll(".winner-btn").forEach(btn=>{
      btn.onclick = ()=>{
        let round = btn.dataset.round, idx = parseInt(btn.dataset.idx), choice = parseInt(btn.dataset.choice);
        let target;
        if(round==="r32") target = knockoutData.r32[idx];
        else if(round==="r16") target = knockoutData.r16[idx];
        else if(round==="qf") target = knockoutData.qf[idx];
        else if(round==="sf") target = knockoutData.sf[idx];
        else if(round==="third") target = knockoutData.third;
        else target = knockoutData.final;
        if(target && ((choice===1 && target.team1) || (choice===2 && target.team2))) target.winner = choice===1?target.team1:target.team2;
        propagate(knockoutData);
        renderKnockoutUI(knockoutData);
      };
    });
  }

  document.getElementById("toKnockoutBtn").onclick = () => {
    const standings = computeStandings();
    const qualified = getQualifiedTeams(standings);
    if(qualified.length !== 32) { alert(`Only ${qualified.length} teams qualified. Need 32.`); return; }
    knockoutData = buildKnockout(qualified);
    propagate(knockoutData);
    document.getElementById("simulatorSection").classList.add("hidden");
    document.getElementById("knockoutSection").classList.remove("hidden");
    renderKnockoutUI(knockoutData);
    const bestThirds = getQualifiedTeams(standings).slice(0,8);
    document.getElementById("thirdPlacePanel").innerHTML = `<strong>🏅 Best 8 third-placed teams</strong><br>${bestThirds.map(t=>`${t.team} (${t.group}) · ${t.pts}pts`).join(' · ')}`;
  };
  document.getElementById("backToSimulatorBtn").onclick = () => {
    document.getElementById("simulatorSection").classList.remove("hidden");
    document.getElementById("knockoutSection").classList.add("hidden");
    renderLiveStandings();
  };

  // initial render
  renderCurrentMatch();
  renderLiveStandings();
</script>
</body>
</html>
