<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WC 2026 Predictor – Official Bracket</title>
  <style>
    :root{
      --bg:#f2f2f7;
      --card:#ffffff;
      --soft:#f7f7fa;
      --line:#e5e5ea;
      --text:#111111;
      --muted:#8e8e93;
      --blue:#11c5d9;
      --tab:#f3f3f6;
      --shadow:0 8px 24px rgba(0,0,0,.06);
      --radius:24px;
    }
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    body{
      background:var(--bg);
      color:var(--text);
      padding:14px;
    }
    .app-shell{
      max-width:1200px;
      margin:0 auto;
    }
    .hero{
      background:var(--card);
      border-radius:34px;
      padding:22px 18px 18px;
      box-shadow:var(--shadow);
      border:1px solid #ededf2;
      margin-bottom:16px;
    }
    .hero-title{
      font-size:clamp(1.9rem,4vw,3.25rem);
      font-weight:800;
      letter-spacing:-0.03em;
    }
    .hero-sub{
      font-size:clamp(1rem,2vw,1.6rem);
      color:var(--muted);
      font-weight:500;
      margin-top:4px;
    }
    .pill{
      display:inline-flex;
      gap:8px;
      background:#ececef;
      border-radius:999px;
      padding:10px 16px;
      font-size:.95rem;
      font-weight:600;
      margin-top:14px;
    }
    .progress-bar{
      height:8px;
      background:#e5e5ea;
      border-radius:999px;
      margin:16px 0 6px;
      overflow:hidden;
    }
    .progress-fill{
      height:100%;
      background:linear-gradient(90deg, #11c5d9, #0a84ff);
      transition:width 0.3s;
    }
    button{
      border:none;
      border-radius:999px;
      padding:12px 18px;
      font-size:.94rem;
      font-weight:700;
      cursor:pointer;
      transition:.2s;
    }
    .btn-orange{ background:#c86d22; color:#fff; }
    .btn-blue{ background:#0a84ff; color:#fff; }
    .btn-dark{ background:#2c2c2e; color:#fff; }
    .btn-gray{ background:#e9e9ee; color:#222; }
    .btn-green{ background:#2f8f54; color:#fff; }
    .segment-wrap, .panel{
      background:var(--card);
      border-radius:28px;
      padding:14px;
      box-shadow:var(--shadow);
      border:1px solid #ededf2;
      margin-bottom:16px;
    }
    .group-tabs{
      display:flex;
      gap:18px;
      overflow:auto;
      padding-bottom:8px;
    }
    .group-tab{
      background:none;
      padding:0 0 10px;
      color:#54545a;
      font-size:1.08rem;
      font-weight:700;
      white-space:nowrap;
      border-bottom:4px solid transparent;
      border-radius:0;
    }
    .group-tab.active{
      color:var(--blue);
      border-bottom-color:var(--blue);
    }
    .main-grid{
      display:grid;
      grid-template-columns:1.35fr 1fr;
      gap:16px;
      align-items:start;
    }
    @media (max-width: 980px){
      .main-grid{ grid-template-columns:1fr; }
    }
    .match-card{
      background:var(--soft);
      border-radius:22px;
      padding:16px 14px;
      margin-bottom:14px;
      border:1px solid #ededf2;
    }
    .match-time{
      text-align:center;
      font-weight:800;
      margin-bottom:14px;
    }
    .match-row{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:12px;
    }
    .team-side{
      display:flex;
      align-items:center;
      gap:10px;
    }
    .team-side.right{
      justify-content:flex-end;
      text-align:right;
    }
    .team-flag{
      width:52px;
      height:52px;
      object-fit:cover;
      border-radius:50%;
      background:#fff;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
      border:2px solid #f0f0f5;
    }
    .team-name{
      font-weight:800;
      line-height:1.2;
    }
    .score-area{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .score-box{
      width:56px;
      height:56px;
      border-radius:14px;
      border:2px solid #d0d0d8;
      background:#fff;
      text-align:center;
      font-size:1.75rem;
      font-weight:400;
    }
    .dash{
      font-size:2rem;
      color:#888;
    }
    .match-meta{
      text-align:center;
      margin-top:12px;
      color:#8a8a92;
      font-weight:700;
      font-size:0.85rem;
    }
    .standings-card{
      background:var(--soft);
      border-radius:22px;
      padding:14px;
      margin-bottom:14px;
    }
    .standings-group-title{
      font-weight:900;
      margin-bottom:12px;
    }
    .standings-row{
      display:grid;
      grid-template-columns:30px minmax(0,1fr) 64px;
      align-items:center;
      gap:10px;
      background:#fff;
      border-radius:16px;
      padding:10px 12px;
      margin-bottom:8px;
    }
    .standings-row.qual{ background:#f0fff7; }
    .standings-row.third{ background:#f4fbff; }
    .team-inline{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:800;
    }
    .team-inline img{
      width:26px;
      height:26px;
      border-radius:50%;
    }
    .pts{
      font-weight:900;
      text-align:right;
    }
    .ko-round{
      margin-bottom:24px;
    }
    .ko-title{
      font-weight:900;
      margin-bottom:14px;
    }
    .ko-match{
      background:var(--soft);
      border-radius:24px;
      padding:18px;
      margin-bottom:14px;
    }
    .ko-match-label{
      text-align:center;
      font-weight:900;
      margin-bottom:14px;
      color:#666;
    }
    .ko-buttons{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:12px;
      align-items:center;
    }
    @media (max-width: 680px){
      .ko-buttons{ grid-template-columns:1fr; }
    }
    .vs{
      font-weight:900;
      color:#8a8a92;
      text-align:center;
    }
    .winner-btn{
      background:#fff;
      border:1px solid #dddde5;
      border-radius:999px;
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      font-weight:800;
      width:100%;
    }
    .winner-btn.active{
      background:#111;
      color:#fff;
    }
    .winner-btn img{
      width:28px;
      height:28px;
      border-radius:50%;
    }
    .champion-box{
      margin:24px 0;
      background:#fff7d7;
      border:2px solid #f0df9b;
      border-radius:26px;
      padding:24px;
      text-align:center;
      font-weight:900;
    }
    .hidden{ display:none !important; }
    @media (max-width: 640px){
      .team-flag{ width:42px; height:42px; }
      .score-box{ width:46px; height:46px; font-size:1.35rem; }
      .team-name{ font-size:.84rem; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="hero">
    <div class="hero-title">WC 2026 Predictor</div>
    <div class="hero-sub">Official FIFA 2026 Bracket</div>
    <div class="pill">United States · Canada · Mexico</div>
    <div class="progress-bar"><div id="progressFill" class="progress-fill" style="width:0%"></div></div>
    <div id="progressText" style="text-align:center; font-size:0.95rem; color:var(--muted);">0 of 72 matches played</div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;">
      <button id="resetBtn" class="btn-orange">Reset Tournament</button>
      <button id="randomResultBtn" class="btn-dark">Random Group Match</button>
      <button id="simulateRemainingBtn" class="btn-green">Simulate Remaining</button>
      <button id="toKnockoutBtn" class="btn-blue hidden">Go to Knockout →</button>
    </div>
  </div>

  <div id="groupStageView">
    <div class="segment-wrap">
      <div class="group-tabs" id="groupTabs"></div>
    </div>
    <div class="main-grid">
      <div class="panel"><div id="matchesPanel"></div></div>
      <div class="panel">
        <div style="display:flex; gap:18px; margin-bottom:14px;">
          <button class="subtab active" data-tab="groups">GROUPS</button>
          <button class="subtab" data-tab="best3rd">BEST 3RD</button>
          <button class="subtab" data-tab="r32">R32 PREVIEW</button>
        </div>
        <div id="standingsPanel"></div>
      </div>
    </div>
  </div>

  <div id="knockoutView" class="hidden">
    <div class="panel">
      <div id="bestThirdsPanel" style="background:#f4fbff; border-radius:24px; padding:20px; margin-bottom:20px;"></div>
      <div id="knockoutPanel"></div>
      <div style="text-align:center; margin-top:24px;">
        <button id="backToGroupsBtn" class="btn-blue">← Back to Groups</button>
      </div>
    </div>
  </div>
</div>

    I: [{matchNo:17,date:"JUN 16, 2:00 PM",city:"New York",stadium:"MetLife",homeIdx:0,awayIdx:1},{matchNo:18,date:"JUN 16, 5:00 PM",city:"Boston",stadium:"Gillette",homeIdx:2,awayIdx:3},{matchNo:41,date:"JUN 22, 3:00 PM",city:"New York",stadium:"MetLife",homeIdx:3,awayIdx:1},{matchNo:42,date:"JUN 22, 8:00 PM",city:"Philadelphia",stadium:"Lincoln Financial",homeIdx:0,awayIdx:2},{matchNo:61,date:"JUN 26, 1:00 PM",city:"Boston",stadium:"Gillette",homeIdx:3,awayIdx:0},{matchNo:62,date:"JUN 26, 1:00 PM",city:"Toronto",stadium:"BMO",homeIdx:1,awayIdx:2}],

  };

  let groupScores = {};
  let allMatches = [];
  let currentGroup = "A";
  let knockoutData = null;
  let currentSubtab = "groups";

  function buildFullSchedule(){
    groupScores = {};
    for(const g of GROUP_KEYS){
      if(scheduleData[g]){
        groupScores[g] = scheduleData[g].map(m => ({...m, homeScore: null, awayScore: null, group: g}));
      }
    }
  }
  function buildMatchesList(){
    allMatches = [];
    for(const g of GROUP_KEYS) for(const m of groupScores[g]) allMatches.push(m);
    allMatches.sort((a,b)=>a.matchNo-b.matchNo);
  }
  function saveProgress(){
    localStorage.setItem("wc2026_predictor", JSON.stringify({groupScores, currentGroup}));
  }
  function loadProgress(){
    const saved = localStorage.getItem("wc2026_predictor");
    if(saved){
      const data = JSON.parse(saved);
      groupScores = data.groupScores || {};
      currentGroup = data.currentGroup || "A";
    }
  }
  function computeStandings(){
    const standings = {};
    for(const g of GROUP_KEYS){
      const stats = GROUPS[g].map((team, idx) => ({team, idx, played:0, wins:0, draws:0, losses:0, gf:0, ga:0, gd:0, pts:0}));
      for(const m of groupScores[g]){
        if(m.homeScore===null || m.awayScore===null) continue;
        const hs = +m.homeScore, as = +m.awayScore;
        const home = stats[m.homeIdx], away = stats[m.awayIdx];
        home.played++; away.played++;
        home.gf += hs; home.ga += as; away.gf += as; away.ga += hs;
        if(hs>as){ home.wins++; home.pts+=3; away.losses++; }
        else if(as>hs){ away.wins++; away.pts+=3; home.losses++; }
        else { home.draws++; away.draws++; home.pts+=1; away.pts+=1; }
      }
      stats.forEach(s => s.gd = s.gf - s.ga);
      stats.sort((a,b)=> b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
      standings[g] = stats;
    }
    return standings;
  }
  function getBestThirdPlacedTeams(standings){
    const thirds = GROUP_KEYS.map(g => ({...standings[g][2], group:g}));
    thirds.sort((a,b)=> b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
    return thirds.slice(0,8);
  }
  function getQualifiedTeamsWithPositions(standings){
    const bestThirds = getBestThirdPlacedTeams(standings);
    const bestGroups = new Set(bestThirds.map(t=>t.group));
    const qualified = [];
    for(const g of GROUP_KEYS){
      qualified.push({...standings[g][0], group:g, position:'winner'});
      qualified.push({...standings[g][1], group:g, position:'runnerup'});
      if(bestGroups.has(g)) qualified.push({...standings[g][2], group:g, position:'third'});
    }
    return qualified;
  }

  // Official FIFA 2026 knockout bracket
  function buildOfficialFIFABracket(qualifiedTeams){
    const winnerMap={}, runnerMap={}, thirdMap={};
    qualifiedTeams.forEach(t=>{
      if(t.position==='winner') winnerMap[t.group]=t;
      else if(t.position==='runnerup') runnerMap[t.group]=t;
      else if(t.position==='third') thirdMap[t.group]=t;
    });
    function bestThirdFromGroups(groups){
      const candidates = groups.filter(g=>thirdMap[g]).map(g=>thirdMap[g]);
      if(candidates.length===0) return null;
      candidates.sort((a,b)=> b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
      return candidates[0];
    }
    const r32 = [
      {matchNo:73, team1:winnerMap['A'], team2:bestThirdFromGroups(['C','D','E']), winner:null},
      {matchNo:74, team1:winnerMap['B'], team2:bestThirdFromGroups(['A','D','E','F']), winner:null},
      {matchNo:75, team1:winnerMap['C'], team2:bestThirdFromGroups(['A','B','F']), winner:null},
      {matchNo:76, team1:winnerMap['D'], team2:bestThirdFromGroups(['B','E','F']), winner:null},
      {matchNo:77, team1:winnerMap['E'], team2:bestThirdFromGroups(['A','B','C','D']), winner:null},
      {matchNo:78, team1:winnerMap['F'], team2:bestThirdFromGroups(['A','B','C']), winner:null},
      {matchNo:79, team1:winnerMap['G'], team2:bestThirdFromGroups(['H','I','J','K','L']), winner:null},
      {matchNo:80, team1:winnerMap['H'], team2:bestThirdFromGroups(['G','I','J','K','L']), winner:null},
      {matchNo:81, team1:winnerMap['I'], team2:runnerMap['J'], winner:null},
      {matchNo:82, team1:winnerMap['J'], team2:runnerMap['I'], winner:null},
      {matchNo:83, team1:winnerMap['K'], team2:runnerMap['L'], winner:null},
      {matchNo:84, team1:winnerMap['L'], team2:runnerMap['K'], winner:null},
      {matchNo:85, team1:runnerMap['A'], team2:runnerMap['B'], winner:null},
      {matchNo:86, team1:runnerMap['C'], team2:runnerMap['D'], winner:null},
      {matchNo:87, team1:runnerMap['E'], team2:runnerMap['F'], winner:null},
      {matchNo:88, team1:runnerMap['G'], team2:runnerMap['H'], winner:null}
    ].filter(m=>m.team1 && m.team2);
    const r16 = Array.from({length:8},(_,i)=>({matchNo:89+i, team1:null, team2:null, winner:null}));
    const qf = Array.from({length:4},(_,i)=>({matchNo:97+i, team1:null, team2:null, winner:null}));
    const sf = Array.from({length:2},(_,i)=>({matchNo:101+i, team1:null, team2:null, winner:null}));
    const third = {matchNo:103, team1:null, team2:null, winner:null};
    const final = {matchNo:104, team1:null, team2:null, winner:null};
    return {r32, r16, qf, sf, third, final};
  }

  function propagateKnockout(k){
    const w32 = k.r32.map(m=> m.winner===m.team1 ? m.team1 : m.winner===m.team2 ? m.team2 : null);
    for(let i=0;i<k.r16.length;i++){ k.r16[i].team1 = w32[i*2]||null; k.r16[i].team2 = w32[i*2+1]||null; if(k.r16[i].winner && ![k.r16[i].team1,k.r16[i].team2].includes(k.r16[i].winner)) k.r16[i].winner=null; }
    const w16 = k.r16.map(m=> m.winner===m.team1 ? m.team1 : m.winner===m.team2 ? m.team2 : null);
    for(let i=0;i<k.qf.length;i++){ k.qf[i].team1 = w16[i*2]||null; k.qf[i].team2 = w16[i*2+1]||null; if(k.qf[i].winner && ![k.qf[i].team1,k.qf[i].team2].includes(k.qf[i].winner)) k.qf[i].winner=null; }
    const wQF = k.qf.map(m=> m.winner===m.team1 ? m.team1 : m.winner===m.team2 ? m.team2 : null);
    for(let i=0;i<k.sf.length;i++){ k.sf[i].team1 = wQF[i*2]||null; k.sf[i].team2 = wQF[i*2+1]||null; if(k.sf[i].winner && ![k.sf[i].team1,k.sf[i].team2].includes(k.sf[i].winner)) k.sf[i].winner=null; }
    const wSF = k.sf.map(m=> m.winner===m.team1 ? m.team1 : m.winner===m.team2 ? m.team2 : null);
    const lSF = k.sf.map(m=>{ if(!m.team1||!m.team2||!m.winner) return null; return m.winner===m.team1 ? m.team2 : m.team1; });
    k.third.team1 = lSF[0]||null; k.third.team2 = lSF[1]||null; if(k.third.winner && ![k.third.team1,k.third.team2].includes(k.third.winner)) k.third.winner=null;
    k.final.team1 = wSF[0]||null; k.final.team2 = wSF[1]||null; if(k.final.winner && ![k.final.team1,k.final.team2].includes(k.final.winner)) k.final.winner=null;
  }

  // Rendering functions
  function dropdownOptions(selected){
    let html = `<option value="" ${selected===null ? "selected" : ""}></option>`;
    for(let i=0;i<=10;i++) html += `<option value="${i}" ${selected===i ? "selected" : ""}>${i}</option>`;
    return html;
  }
  function renderGroupTabs(){
    const holder = document.getElementById("groupTabs");
    holder.innerHTML = GROUP_KEYS.map(g => `<button class="group-tab ${currentGroup===g ? 'active' : ''}" data-group="${g}">GROUP ${g}</button>`).join("");
    holder.querySelectorAll(".group-tab").forEach(btn=>{ btn.onclick = ()=>{ currentGroup = btn.dataset.group; renderGroupTabs(); renderMatchesPanel(); renderStandingsPanel(); }; });
  }
  function renderMatchesPanel(){
    const box = document.getElementById("matchesPanel");
    const matches = groupScores[currentGroup] || [];
    box.innerHTML = matches.map(m=>{
      const home = GROUPS[m.group][m.homeIdx], away = GROUPS[m.group][m.awayIdx];
      return `<div class="match-card"><div class="match-time">${m.date} • ${m.stadium}</div><div class="match-row"><div class="team-side left"><img class="team-flag" src="${getFlagUrl(home)}"><div class="team-name">${home}</div></div><div class="score-area"><select class="score-box" data-group="${m.group}" data-match="${m.matchNo}" data-side="home">${dropdownOptions(m.homeScore)}</select><div class="dash">-</div><select class="score-box" data-group="${m.group}" data-match="${m.matchNo}" data-side="away">${dropdownOptions(m.awayScore)}</select></div><div class="team-side right"><div class="team-name">${away}</div><img class="team-flag" src="${getFlagUrl(away)}"></div></div><div class="match-meta">Match ${m.matchNo} • ${m.city}</div></div>`;
    }).join("");
    box.querySelectorAll(".score-box").forEach(sel=>{
      sel.addEventListener("change",()=>{
        const group = sel.dataset.group, matchNo = +sel.dataset.match, side = sel.dataset.side;
        const match = groupScores[group].find(x=>x.matchNo===matchNo);
        if(match){ const v = sel.value==="" ? null : +sel.value; if(side==="home") match.homeScore=v; else match.awayScore=v; }
        renderProgress(); renderStandingsPanel(); renderMatchesPanel(); saveProgress();
      });
    });
  }
  function renderStandingsPanel(){
    const standings = computeStandings();
    const bestThirds = getBestThirdPlacedTeams(standings);
    const bestThirdSet = new Set(bestThirds.map(t=>`${t.group}-${t.team}`));
    const box = document.getElementById("standingsPanel");
    let html = "";
    if(currentSubtab==="groups"){
      for(const g of GROUP_KEYS){
        html += `<div class="standings-card"><div class="standings-group-title">GROUP ${g}</div><div class="standings-list">`;
        html += standings[g].map((row,idx)=>{ let cls=""; if(idx<2) cls="qual"; else if(bestThirdSet.has(`${g}-${row.team}`)) cls="third"; return `<div class="standings-row ${cls}"><div class="rank">${idx+1}</div><div class="team-inline"><img src="${getFlagUrl(row.team)}"><span>${row.team}</span></div><div class="pts">${row.pts} pts</div></div>`; }).join("");
        html += `</div></div>`;
      }
    } else if(currentSubtab==="best3rd"){
      html = `<div class="standings-card"><div class="standings-group-title">Best 8 Third-Placed Teams</div>`;
      html += bestThirds.map((t,i)=>`<div class="standings-row"><div class="rank">${i+1}</div><div class="team-inline"><img src="${getFlagUrl(t.team)}"><span>${t.team} (${t.group})</span></div><div class="pts">${t.pts} pts</div></div>`).join("");
      html += `</div>`;
    } else if(currentSubtab==="r32"){
      const played = allMatches.filter(m=>m.homeScore!==null && m.awayScore!==null).length;
      const qualified = getQualifiedTeamsWithPositions(standings);
      if(played===allMatches.length && qualified.length===32){
        const tmp = buildOfficialFIFABracket(qualified);
        html = `<div class="standings-card"><div class="standings-group-title">Round of 32 (Official FIFA 2026)</div>`;
        html += tmp.r32.map(m=>`<div style="padding:12px; background:#fff; border-radius:16px; margin-bottom:8px; display:flex; justify-content:space-between;"><div style="display:flex; gap:8px;"><img src="${getFlagUrl(m.team1.team)}" style="width:24px;height:24px;border-radius:50%;"><span>${m.team1.team}</span></div><div>VS</div><div style="display:flex; gap:8px;"><span>${m.team2.team}</span><img src="${getFlagUrl(m.team2.team)}" style="width:24px;height:24px;border-radius:50%;"></div></div>`).join("");
        html += `</div>`;
      } else { html = `<div class="standings-card"><p style="text-align:center; padding:20px;">Complete all group matches to see the R32 bracket</p></div>`; }
    }
    box.innerHTML = html;
  }
  function renderProgress(){
    const played = allMatches.filter(m=>m.homeScore!==null && m.awayScore!==null).length;
    const percent = Math.round((played/allMatches.length)*100)||0;
    document.getElementById("progressFill").style.width = percent+"%";
    document.getElementById("progressText").innerHTML = `${played} of ${allMatches.length} matches played`;
    document.getElementById("toKnockoutBtn").classList.toggle("hidden", played<allMatches.length);
  }
  function renderKnockoutUI(){
    if(!knockoutData) return;
    const panel = document.getElementById("knockoutPanel");
    let html = "";
    const rounds = [
      {title:"Round of 32", key:"r32", data:knockoutData.r32},
      {title:"Round of 16", key:"r16", data:knockoutData.r16},
      {title:"Quarter-finals", key:"qf", data:knockoutData.qf},
      {title:"Semi-finals", key:"sf", data:knockoutData.sf}
    ];
    rounds.forEach(round=>{
      html += `<div class="ko-round"><div class="ko-title">${round.title}</div>`;
      html += round.data.map((m,i)=>`<div class="ko-match"><div class="ko-match-label">Match ${m.matchNo}</div><div class="ko-buttons"><button class="winner-btn ${m.winner===m.team1?'active':''}" data-round="${round.key}" data-idx="${i}" data-choice="1">${m.team1?`<img src="${getFlagUrl(m.team1.team)}"><span>${m.team1.team}</span>`:'<span>—</span>'}</button><div class="vs">VS</div><button class="winner-btn ${m.winner===m.team2?'active':''}" data-round="${round.key}" data-idx="${i}" data-choice="2">${m.team2?`<img src="${getFlagUrl(m.team2.team)}"><span>${m.team2.team}</span>`:'<span>—</span>'}</button></div></div>`).join("");
      html += `</div>`;
    });
    html += `<div class="ko-round"><div class="ko-title">Third Place Match</div>${renderSingleKoMatch(knockoutData.third,"third",0)}</div>`;
    html += `<div class="ko-round"><div class="ko-title">Final</div>${renderSingleKoMatch(knockoutData.final,"final",0)}</div>`;
    if(knockoutData.final.winner) html += `<div class="champion-box">🏆 World Champion: ${knockoutData.final.winner.team}</div>`;
    if(knockoutData.third.winner) html += `<div class="champion-box" style="background:#f4fbff;border-color:#c0d8ff;">🥉 Third Place: ${knockoutData.third.winner.team}</div>`;
    panel.innerHTML = html;
    panel.querySelectorAll(".winner-btn").forEach(btn=>{
      btn.onclick = ()=>{
        const round = btn.dataset.round, idx = +btn.dataset.idx, choice = +btn.dataset.choice;
        let target=null;
        if(round==="r32") target=knockoutData.r32[idx];
        else if(round==="r16") target=knockoutData.r16[idx];
        else if(round==="qf") target=knockoutData.qf[idx];
        else if(round==="sf") target=knockoutData.sf[idx];
        else if(round==="third") target=knockoutData.third;
        else if(round==="final") target=knockoutData.final;
        if(!target) return;
        const selected = choice===1 ? target.team1 : target.team2;
        if(!selected) return;
        target.winner = selected;
        propagateKnockout(knockoutData);
        renderKnockoutUI();
      };
    });
  }
  function renderSingleKoMatch(m,roundKey,idx){
    return `<div class="ko-match"><div class="ko-match-label">Match ${m.matchNo}</div><div class="ko-buttons"><button class="winner-btn ${m.winner===m.team1?'active':''}" data-round="${roundKey}" data-idx="${idx}" data-choice="1">${m.team1?`<img src="${getFlagUrl(m.team1.team)}"><span>${m.team1.team}</span>`:'<span>—</span>'}</button><div class="vs">VS</div><button class="winner-btn ${m.winner===m.team2?'active':''}" data-round="${roundKey}" data-idx="${idx}" data-choice="2">${m.team2?`<img src="${getFlagUrl(m.team2.team)}"><span>${m.team2.team}</span>`:'<span>—</span>'}</button></div></div>`;
  }
  function goToKnockout(){
    const standings = computeStandings();
    const qualified = getQualifiedTeamsWithPositions(standings);
    if(qualified.length!==32){ alert("Complete all group stage matches first."); return; }
    knockoutData = buildOfficialFIFABracket(qualified);
    propagateKnockout(knockoutData);
    const bestThirds = getBestThirdPlacedTeams(standings);
    document.getElementById("bestThirdsPanel").innerHTML = `<strong>Best 8 Third-Placed Teams (Advanced)</strong><br>${bestThirds.map(t=>`${t.team} (${t.group}) — ${t.pts} pts`).join(" • ")}`;
    document.getElementById("groupStageView").classList.add("hidden");
    document.getElementById("knockoutView").classList.remove("hidden");
    renderKnockoutUI();
  }

  // Event listeners
  document.getElementById("resetBtn").onclick = ()=>{
    if(confirm("Reset entire tournament?")){ localStorage.removeItem("wc2026_predictor"); buildFullSchedule(); buildMatchesList(); currentGroup="A"; knockoutData=null; document.getElementById("groupStageView").classList.remove("hidden"); document.getElementById("knockoutView").classList.add("hidden"); renderGroupTabs(); renderMatchesPanel(); renderStandingsPanel(); renderProgress(); }
  };
  document.getElementById("randomResultBtn").onclick = ()=>{
    const currentMatches = groupScores[currentGroup];
    if(currentMatches && currentMatches.length){
      const unplayed = currentMatches.filter(m=>m.homeScore===null || m.awayScore===null);
      if(unplayed.length){
        const m = unplayed[0];
        m.homeScore = Math.floor(Math.random()*5);
        m.awayScore = Math.floor(Math.random()*5);
        renderMatchesPanel(); renderStandingsPanel(); renderProgress(); saveProgress();
      } else alert("All matches in this group are already played.");
    }
  };
  document.getElementById("simulateRemainingBtn").onclick = ()=>{
    for(const g of GROUP_KEYS){
      for(const m of groupScores[g]){
        if(m.homeScore===null || m.awayScore===null){
          m.homeScore = Math.floor(Math.random()*4);
          m.awayScore = Math.floor(Math.random()*4);
        }
      }
    }
    renderMatchesPanel(); renderStandingsPanel(); renderProgress(); saveProgress();
  };
  document.getElementById("toKnockoutBtn").onclick = goToKnockout;
  document.getElementById("backToGroupsBtn").onclick = ()=>{ document.getElementById("knockoutView").classList.add("hidden"); document.getElementById("groupStageView").classList.remove("hidden"); };
  document.querySelectorAll(".subtab").forEach(tab=>{
    tab.onclick = ()=>{ document.querySelectorAll(".subtab").forEach(t=>t.classList.remove("active")); tab.classList.add("active"); currentSubtab = tab.dataset.tab; renderStandingsPanel(); };
  });

  // Initialization
  loadProgress();
  if(Object.keys(groupScores).length===0) buildFullSchedule();
  buildMatchesList();
  renderGroupTabs();
  renderMatchesPanel();
  renderStandingsPanel();
  renderProgress();
  window.addEventListener("beforeunload", saveProgress);
</script>
</body>
</html>
