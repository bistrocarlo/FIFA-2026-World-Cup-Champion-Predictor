<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WC 2026 Predictor</title>
  <style>
    :root{
      --bg:#f2f2f7;
      --card:#ffffff;
      --soft:#f7f7fa;
      --line:#e5e5ea;
      --text:#111111;
      --muted:#8e8e93;
      --blue:#11c5d9;
      --tab:#f3f3f6;
      --shadow:0 8px 24px rgba(0,0,0,.06);
      --radius:24px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--text);
      padding:14px;
    }

    .app-shell{
      max-width:1200px;
      margin:0 auto;
    }

    .hero{
      background:var(--card);
      border-radius:34px;
      padding:22px 18px 18px;
      box-shadow:var(--shadow);
      border:1px solid #ededf2;
      margin-bottom:16px;
    }

    .hero-title{
      font-size:clamp(1.9rem,4vw,3.25rem);
      line-height:1;
      font-weight:800;
      letter-spacing:-0.03em;
    }

    .hero-sub{
      font-size:clamp(1rem,2vw,1.6rem);
      color:var(--muted);
      font-weight:500;
      letter-spacing:-0.02em;
      margin-top:4px;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#ececef;
      color:#5d5d64;
      border-radius:999px;
      padding:10px 16px;
      font-size:.95rem;
      font-weight:600;
      margin-top:14px;
    }

    .progress-bar{
      height:8px;
      background:#e5e5ea;
      border-radius:999px;
      margin:16px 0 6px;
      overflow:hidden;
    }

    .progress-fill{
      height:100%;
      background:linear-gradient(90deg, #11c5d9, #0a84ff);
      transition:width 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    button{
      border:none;
      border-radius:999px;
      padding:12px 18px;
      font-size:.94rem;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
    }

    button:hover{
      transform:translateY(-1px);
      filter:brightness(0.98);
    }

    .btn-orange{ background:#c86d22; color:#fff; }
    .btn-blue{ background:#0a84ff; color:#fff; }
    .btn-dark{ background:#2c2c2e; color:#fff; }
    .btn-gray{ background:#e9e9ee; color:#222; }
    .btn-green{ background:#2f8f54; color:#fff; }

    .segment-wrap, .panel{
      background:var(--card);
      border-radius:28px;
      padding:14px;
      box-shadow:var(--shadow);
      border:1px solid #ededf2;
      margin-bottom:16px;
    }

    .segment{
      display:grid;
      grid-template-columns:1fr 1fr;
      background:var(--tab);
      border-radius:18px;
      padding:4px;
      gap:4px;
      max-width:440px;
      margin:0 auto 14px;
    }

    .segment button{
      background:transparent;
      color:#444;
      border-radius:14px;
      padding:11px;
      font-weight:700;
    }

    .segment button.active{
      background:#fff;
      box-shadow:0 2px 6px rgba(0,0,0,.1);
    }

    .group-tabs, .subtabs{
      display:flex;
      gap:18px;
      overflow:auto;
      padding-bottom:8px;
      scrollbar-width:none;
    }

    .group-tabs::-webkit-scrollbar, .subtabs::-webkit-scrollbar{
      display:none;
    }

    .group-tab, .subtab{
      background:none;
      padding:0 0 10px;
      color:#54545a;
      font-size:1.08rem;
      font-weight:700;
      white-space:nowrap;
      border-bottom:4px solid transparent;
    }

    .group-tab.active, .subtab.active{
      color:var(--blue);
      border-bottom-color:var(--blue);
    }

    .main-grid{
      display:grid;
      grid-template-columns:1.35fr 1fr;
      gap:16px;
      align-items:start;
    }

    @media (max-width: 980px){
      .main-grid{
        grid-template-columns:1fr;
      }
    }

    .match-card{
      background:var(--soft);
      border-radius:22px;
      padding:16px 14px 14px;
      margin-bottom:14px;
      border:1px solid #ededf2;
    }

    .match-time{
      text-align:center;
      font-size:1rem;
      font-weight:800;
      margin-bottom:14px;
      letter-spacing:-0.01em;
    }

    .match-row{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:12px;
    }

    .team-side{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .team-side.right{
      justify-content:flex-end;
      text-align:right;
    }

    .team-flag{
      width:52px;
      height:52px;
      object-fit:cover;
      border-radius:50%;
      background:#fff;
      box-shadow:0 4px 12px rgba(0,0,0,.08);
      border:2px solid #f0f0f5;
      flex-shrink:0;
    }

    .team-name{
      font-size:1rem;
      font-weight:800;
      line-height:1.12;
      word-break:break-word;
    }

    .score-area{
      display:flex;
      align-items:center;
      gap:8px;
      justify-content:center;
      flex-shrink:0;
    }

    .score-box{
      width:56px;
      height:56px;
      border-radius:14px;
      border:2px solid #d0d0d8;
      background:#fff;
      text-align:center;
      font-size:1.75rem;
      font-weight:400;
      color:#555;
      appearance:none;
    }

    .dash{
      font-size:2rem;
      color:#888;
      margin-top:-4px;
      width:10px;
      text-align:center;
    }

    .match-meta{
      text-align:center;
      margin-top:12px;
      color:#8a8a92;
      font-weight:700;
      font-size:0.89rem;
    }

    .standings-card{
      background:var(--soft);
      border-radius:22px;
      padding:14px;
      border:1px solid #ededf2;
      margin-bottom:14px;
    }

    .standings-group-title{
      font-size:1.1rem;
      font-weight:900;
      letter-spacing:-0.02em;
      margin-bottom:12px;
    }

    .standings-row{
      display:grid;
      grid-template-columns:30px minmax(0,1fr) 64px;
      align-items:center;
      gap:10px;
      background:#fff;
      border:1px solid #e8e8ee;
      border-radius:16px;
      padding:10px 12px;
      margin-bottom:8px;
    }

    .standings-row.qual{ background:#f0fff7; }
    .standings-row.third{ background:#f4fbff; }

    .team-inline{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      font-weight:800;
    }

    .team-inline img{
      width:26px;
      height:26px;
      border-radius:50%;
      object-fit:cover;
      border:1px solid #ececf1;
      flex-shrink:0;
    }

    .team-inline span{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      display:block;
    }

    .rank{
      font-weight:900;
      color:#666;
      text-align:center;
    }

    .pts{
      font-weight:900;
      white-space:nowrap;
      text-align:right;
    }

    .ko-round{
      margin-bottom:24px;
    }

    .ko-title{
      font-size:1.22rem;
      font-weight:900;
      margin-bottom:14px;
      letter-spacing:-0.02em;
    }

    .ko-match{
      background:var(--soft);
      border-radius:24px;
      padding:18px;
      border:1px solid #ededf2;
      margin-bottom:14px;
    }

    .ko-match-label{
      text-align:center;
      font-weight:900;
      margin-bottom:14px;
      color:#666;
    }

    .ko-buttons{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:12px;
      align-items:center;
    }

    @media (max-width: 680px){
      .ko-buttons{
        grid-template-columns:1fr;
      }
    }

    .vs{
      font-weight:900;
      color:#8a8a92;
      text-align:center;
    }

    .winner-btn{
      background:#fff;
      border:1px solid #dddde5;
      border-radius:999px;
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      min-height:60px;
      font-weight:800;
      font-size:1rem;
      width:100%;
    }

    .winner-btn img{
      width:28px;
      height:28px;
      border-radius:50%;
      object-fit:cover;
      border:1px solid #ececf1;
    }

    .winner-btn.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .champion-box{
      margin:24px 0;
      background:#fff7d7;
      border:2px solid #f0df9b;
      border-radius:26px;
      padding:24px;
      text-align:center;
      font-size:1.45rem;
      font-weight:900;
      box-shadow:0 4px 20px rgba(240,223,155,.3);
    }

    .hidden{
      display:none !important;
    }

    @media (max-width: 640px){
      body{
        padding:10px;
      }

      .hero{
        padding:18px 14px 16px;
        border-radius:28px;
      }

      .segment-wrap, .panel{
        padding:12px;
        border-radius:24px;
      }

      .group-tab, .subtab{
        font-size:.98rem;
      }

      .match-card{
        padding:14px 12px 12px;
      }

      .match-time{
        font-size:.98rem;
        margin-bottom:12px;
      }

      .match-row{
        gap:8px;
      }

      .team-side{
        gap:8px;
      }

      .team-flag{
        width:42px;
        height:42px;
      }

      .team-name{
        font-size:.84rem;
        line-height:1.08;
      }

      .score-area{
        gap:6px;
      }

      .score-box{
        width:46px;
        height:46px;
        font-size:1.35rem;
        border-radius:12px;
      }

      .dash{
        font-size:1.55rem;
        width:8px;
      }

      .standings-row{
        grid-template-columns:24px minmax(0,1fr) 54px;
        gap:8px;
        padding:9px 10px;
      }

      .team-inline{
        gap:8px;
      }

      .team-inline img{
        width:22px;
        height:22px;
      }

      .team-inline span{
        font-size:.92rem;
      }

      .pts{
        font-size:.9rem;
      }

      button{
        padding:11px 14px;
        font-size:.88rem;
      }
    }

</head>

        {matchNo:23, date:"JUN 17, 8:00 PM", city:"Mexico City", stadium:"Estadio Azteca", homeIdx:2, awayIdx:3},
        {matchNo:47, date:"JUN 23, 3:00 PM", city:"Houston", stadium:"NRG", homeIdx:0, awayIdx:2},
        {matchNo:48, date:"JUN 23, 8:00 PM", city:"Guadalajara", stadium:"Estadio Akron", homeIdx:3, awayIdx:1},
        {matchNo:71, date:"JUN 27, 6:00 PM", city:"Miami", stadium:"Hard Rock", homeIdx:3, awayIdx:0},
        {matchNo:72, date:"JUN 27, 6:00 PM", city:"Atlanta", stadium:"Mercedes-Benz", homeIdx:1, awayIdx:2}
      ],
      L: [
        {matchNo:22, date:"JUN 17, 5:00 PM", city:"Toronto", stadium:"BMO", homeIdx:2, awayIdx:3},
        {matchNo:24, date:"JUN 17, 10:00 PM", city:"Dallas", stadium:"AT&T", homeIdx:0, awayIdx:1},
        {matchNo:45, date:"JUN 23, 10:00 PM", city:"Boston", stadium:"Gillette", homeIdx:0, awayIdx:2},
        {matchNo:46, date:"JUN 23, 10:00 PM", city:"Toronto", stadium:"BMO", homeIdx:3, awayIdx:1},
        {matchNo:67, date:"JUN 27, 1:00 PM", city:"New York", stadium:"MetLife", homeIdx:3, awayIdx:0},
        {matchNo:68, date:"JUN 27, 1:00 PM", city:"Philadelphia", stadium:"Lincoln Financial", homeIdx:1, awayIdx:2}
      ]
    };

    let groupScores = {};
    let allMatches = [];
    let currentMatchIdx = 0;
    let selectedGroup = "A";
    let knockoutData = null;
    let currentSubtab = "groups";

    function buildFullSchedule(){
      groupScores = {};
      for(const g of GROUP_KEYS){
        if(scheduleData[g]){
          groupScores[g] = scheduleData[g].map(m => ({
            ...m,
            homeScore: null,
            awayScore: null,
            group: g
          }));
        }
      }
    }

    function buildMatchesList(){
      allMatches = [];
      for(const g of GROUP_KEYS){
        for(const m of groupScores[g]) allMatches.push(m);
      }
      allMatches.sort((a,b) => a.matchNo - b.matchNo);
    }

    function saveProgress(){
      const data = {
        groupScores: JSON.parse(JSON.stringify(groupScores)),
        currentMatchIdx,
        selectedGroup
      };
      localStorage.setItem("wc2026_predictor", JSON.stringify(data));
    }

    function loadProgress(){
      const saved = localStorage.getItem("wc2026_predictor");
      if(saved){
        const data = JSON.parse(saved);
        groupScores = data.groupScores || {};
        currentMatchIdx = data.currentMatchIdx || 0;
        selectedGroup = data.selectedGroup || "A";
      }
    }

    function computeStandings(){
      const standings = {};
      for(const g of GROUP_KEYS){
        const stats = GROUPS[g].map((team, idx) => ({
          team, idx, played:0, wins:0, draws:0, losses:0, gf:0, ga:0, gd:0, pts:0
        }));

        for(const m of groupScores[g]){
          if(m.homeScore === null || m.awayScore === null) continue;

          const hs = Number(m.homeScore);
          const as = Number(m.awayScore);
          const home = stats[m.homeIdx];
          const away = stats[m.awayIdx];

          home.played++;
          away.played++;
          home.gf += hs;
          home.ga += as;
          away.gf += as;
          away.ga += hs;

          if(hs > as){
            home.wins++;
            home.pts += 3;
            away.losses++;
          } else if(as > hs){
            away.wins++;
            away.pts += 3;
            home.losses++;
          } else {
            home.draws++;
            away.draws++;
            home.pts += 1;
            away.pts += 1;
          }
        }

        stats.forEach(s => s.gd = s.gf - s.ga);
        stats.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
        standings[g] = stats;
      }
      return standings;
    }

    function getBestThirdPlacedTeams(standings){
      const thirds = GROUP_KEYS.map(g => ({...standings[g][2], group:g}));
      thirds.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
      return thirds.slice(0,8);
    }

    function getQualifiedTeams(standings){
      const bestThirds = getBestThirdPlacedTeams(standings);
      const bestGroups = new Set(bestThirds.map(t => t.group));
      const qualified = [];

      for(const g of GROUP_KEYS){
        qualified.push({...standings[g][0], group:g});
        qualified.push({...standings[g][1], group:g});
        if(bestGroups.has(g)){
          qualified.push({...standings[g][2], group:g});
        }
      }

      qualified.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
      return qualified;
    }

    function buildKnockout(qualified){
      const r32 = [];
      for(let i = 0; i < 16; i++){
        r32.push({
          matchNo: 73 + i,
          team1: qualified[i],
          team2: qualified[31 - i],
          winner: null
        });
      }

      const r16 = Array.from({length:8}, (_,i) => ({matchNo:89+i, team1:null, team2:null, winner:null}));
      const qf = Array.from({length:4}, (_,i) => ({matchNo:97+i, team1:null, team2:null, winner:null}));
      const sf = Array.from({length:2}, (_,i) => ({matchNo:101+i, team1:null, team2:null, winner:null}));
      const third = {matchNo:103, team1:null, team2:null, winner:null};
      const final = {matchNo:104, team1:null, team2:null, winner:null};

      return {r32, r16, qf, sf, third, final};
    }

    function propagateKnockout(k){
      const winners32 = k.r32.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);

      for(let i=0; i<k.r16.length; i++){
        k.r16[i].team1 = winners32[i*2] || null;
        k.r16[i].team2 = winners32[i*2+1] || null;
        if(k.r16[i].winner && ![k.r16[i].team1, k.r16[i].team2].includes(k.r16[i].winner)) k.r16[i].winner = null;
      }

      const winners16 = k.r16.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);

      for(let i=0; i<k.qf.length; i++){
        k.qf[i].team1 = winners16[i*2] || null;
        k.qf[i].team2 = winners16[i*2+1] || null;
        if(k.qf[i].winner && ![k.qf[i].team1, k.qf[i].team2].includes(k.qf[i].winner)) k.qf[i].winner = null;
      }

      const winnersQF = k.qf.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);

      for(let i=0; i<k.sf.length; i++){
        k.sf[i].team1 = winnersQF[i*2] || null;
        k.sf[i].team2 = winnersQF[i*2+1] || null;
        if(k.sf[i].winner && ![k.sf[i].team1, k.sf[i].team2].includes(k.sf[i].winner)) k.sf[i].winner = null;
      }

      const winnersSF = k.sf.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);
      const losersSF = k.sf.map(m => {
        if(!m.team1 || !m.team2 || !m.winner) return null;
        return m.winner === m.team1 ? m.team2 : m.team1;
      });

      k.third.team1 = losersSF[0] || null;
      k.third.team2 = losersSF[1] || null;
      if(k.third.winner && ![k.third.team1, k.third.team2].includes(k.third.winner)) k.third.winner = null;

      k.final.team1 = winnersSF[0] || null;
      k.final.team2 = winnersSF[1] || null;
      if(k.final.winner && ![k.final.team1, k.final.team2].includes(k.final.winner)) k.final.winner = null;
    }

    function dropdownOptions(selected){
      let html = `<option value="" ${selected === null ? "selected" : ""}></option>`;
      for(let i=0; i<=10; i++){
        html += `<option value="${i}" ${selected === i ? "selected" : ""}>${i}</option>`;
      }
      return html;
    }

    function renderGroupTabs(){
      const holder = document.getElementById("groupTabs");
      holder.innerHTML = GROUP_KEYS.map(g => `
        <button class="group-tab ${selectedGroup===g ? 'active' : ''}" data-group="${g}">GROUP ${g}</button>
      `).join("");

      holder.querySelectorAll(".group-tab").forEach(btn => {
        btn.onclick = () => {
          selectedGroup = btn.dataset.group;
          renderGroupTabs();
          renderMatchesPanel();
          renderStandingsPanel();
        };
      });
    }

    function renderMatchesPanel(){
      const box = document.getElementById("matchesPanel");
      const matches = groupScores[selectedGroup] || [];

      box.innerHTML = matches.map((m) => {
        const home = GROUPS[m.group][m.homeIdx];
        const away = GROUPS[m.group][m.awayIdx];
        const isCurrent = allMatches[currentMatchIdx] && allMatches[currentMatchIdx].matchNo === m.matchNo;

        return `
          <div class="match-card" style="${isCurrent ? 'outline:3px solid rgba(17,197,217,.25);' : ''}">
            <div class="match-time">${m.date} • ${m.stadium}</div>

            <div class="match-row">
              <div class="team-side left">
                <img class="team-flag" src="${getFlagUrl(home)}" alt="${home}">
                <div class="team-name">${home}</div>
              </div>

              <div class="score-area">
                <select class="score-box" data-group="${m.group}" data-match="${m.matchNo}" data-side="home">
                  ${dropdownOptions(m.homeScore)}
                </select>
                <div class="dash">-</div>
                <select class="score-box" data-group="${m.group}" data-match="${m.matchNo}" data-side="away">
                  ${dropdownOptions(m.awayScore)}
                </select>
              </div>

              <div class="team-side right">
                <div class="team-name">${away}</div>
                <img class="team-flag" src="${getFlagUrl(away)}" alt="${away}">
              </div>
            </div>

            <div class="match-meta">Match ${m.matchNo} • ${m.city}</div>
          </div>
        `;
      }).join("");

      box.querySelectorAll(".score-box").forEach(sel => {
        sel.addEventListener("change", () => {
          const group = sel.dataset.group;
          const matchNo = Number(sel.dataset.match);
          const side = sel.dataset.side;
          const match = groupScores[group].find(x => x.matchNo === matchNo);

          if(match){
            const value = sel.value === "" ? null : Number(sel.value);
            if(side === "home") match.homeScore = value;
            else match.awayScore = value;
          }

          renderProgress();
          renderStandingsPanel();
          renderMatchesPanel();
          saveProgress();
        });
      });
    }

    function renderStandingsPanel(){
      const standings = computeStandings();
      const bestThirds = getBestThirdPlacedTeams(standings);
      const bestThirdSet = new Set(bestThirds.map(t => `${t.group}-${t.team}`));
      const box = document.getElementById("standingsPanel");

      let html = "";

      if(currentSubtab === "groups"){
        for(const g of GROUP_KEYS){
          html += `
            <div class="standings-card">
              <div class="standings-group-title">GROUP ${g}</div>
              <div class="standings-list">
                ${standings[g].map((row, idx) => {
                  let cls = "";
                  if(idx < 2) cls = "qual";
                  else if(bestThirdSet.has(`${g}-${row.team}`)) cls = "third";
                  return `
                    <div class="standings-row ${cls}">
                      <div class="rank">${idx+1}</div>
                      <div class="team-inline">
                        <img src="${getFlagUrl(row.team)}" alt="${row.team}">
                        <span>${row.team}</span>
                      </div>
                      <div class="pts">${row.pts} pts</div>
                    </div>
                  `;
                }).join("")}
              </div>
            </div>
          `;
        }
      } else if(currentSubtab === "best3rd"){
        html = `<div class="standings-card"><div class="standings-group-title">Best 8 Third-Placed Teams</div>`;
        html += bestThirds.map((t,i) => `
          <div class="standings-row">
            <div class="rank">${i+1}</div>
            <div class="team-inline">
              <img src="${getFlagUrl(t.team)}" alt="${t.team}">
              <span>${t.team} (${t.group})</span>
            </div>
            <div class="pts">${t.pts} pts</div>
          </div>
        `).join("");
        html += `</div>`;
      } else if(currentSubtab === "r32"){
        const played = allMatches.filter(m => m.homeScore !== null && m.awayScore !== null).length;
        const qualified = getQualifiedTeams(standings);

        if(played === allMatches.length && qualified.length === 32){
          const tempKnockout = buildKnockout(qualified);
          html = `<div class="standings-card"><div class="standings-group-title">Round of 32 Preview</div>`;
          html += tempKnockout.r32.map(m => `
            <div style="padding:12px; background:#fff; border-radius:16px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; gap:10px;">
              <div style="display:flex; align-items:center; gap:8px; min-width:0;">
                ${m.team1 ? `<img src="${getFlagUrl(m.team1.team)}" style="width:24px;height:24px;border-radius:50%;flex-shrink:0;"> <span style="font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.team1.team}</span>` : '—'}
              </div>
              <div style="font-weight:700; color:#888; flex-shrink:0;">VS</div>
              <div style="display:flex; align-items:center; gap:8px; min-width:0; justify-content:flex-end; text-align:right;">
                ${m.team2 ? `<span style="font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.team2.team}</span> <img src="${getFlagUrl(m.team2.team)}" style="width:24px;height:24px;border-radius:50%;flex-shrink:0;">` : '—'}
              </div>
            </div>
          `).join("");
          html += `</div>`;
        } else {
          html = `<div class="standings-card"><p style="text-align:center; padding:20px; color:#888;">Complete all group matches to see R32 preview</p></div>`;
        }
      }

      box.innerHTML = html;
    }

    function renderProgress(){
      const played = allMatches.filter(m => m.homeScore !== null && m.awayScore !== null).length;
      const percent = Math.round((played / allMatches.length) * 100) || 0;
      document.getElementById("progressFill").style.width = percent + "%";
      document.getElementById("progressText").textContent = `${played} of ${allMatches.length} matches played`;
      document.getElementById("toKnockoutBtn").classList.toggle("hidden", played < allMatches.length);
    }

    function renderKnockoutUI(){
      if(!knockoutData) return;
      const panel = document.getElementById("knockoutPanel");
      let html = "";

      const rounds = [
        {title:"Round of 32", key:"r32", data:knockoutData.r32},
        {title:"Round of 16", key:"r16", data:knockoutData.r16},
        {title:"Quarter-finals", key:"qf", data:knockoutData.qf},
        {title:"Semi-finals", key:"sf", data:knockoutData.sf}
      ];

      rounds.forEach(round => {
        html += `<div class="ko-round"><div class="ko-title">${round.title}</div>`;
        html += round.data.map((m,i) => `
          <div class="ko-match">
            <div class="ko-match-label">Match ${m.matchNo}</div>
            <div class="ko-buttons">
              <button class="winner-btn ${m.winner === m.team1 ? 'active' : ''}" data-round="${round.key}" data-idx="${i}" data-choice="1">
                ${m.team1 ? `<img src="${getFlagUrl(m.team1.team)}" alt=""> <span>${m.team1.team}</span>` : '<span>—</span>'}
              </button>
              <div class="vs">VS</div>
              <button class="winner-btn ${m.winner === m.team2 ? 'active' : ''}" data-round="${round.key}" data-idx="${i}" data-choice="2">
                ${m.team2 ? `<img src="${getFlagUrl(m.team2.team)}" alt=""> <span>${m.team2.team}</span>` : '<span>—</span>'}
              </button>
            </div>
          </div>
        `).join("");
        html += `</div>`;
      });

      html += `
        <div class="ko-round">
          <div class="ko-title">Third Place Match</div>
          ${renderSingleKoMatch(knockoutData.third, "third", 0)}
        </div>
        <div class="ko-round">
          <div class="ko-title">Final</div>
          ${renderSingleKoMatch(knockoutData.final, "final", 0)}
        </div>
      `;

      if(knockoutData.final.winner){
        html += `<div class="champion-box">🏆 World Champion: ${knockoutData.final.winner.team}</div>`;
      }
      if(knockoutData.third.winner){
        html += `<div class="champion-box" style="background:#f4fbff;border-color:#c0d8ff;box-shadow:none;">🥉 Third Place: ${knockoutData.third.winner.team}</div>`;
      }

      panel.innerHTML = html;

      panel.querySelectorAll(".winner-btn").forEach(btn => {
        btn.onclick = () => {
          const round = btn.dataset.round;
          const idx = Number(btn.dataset.idx);
          const choice = Number(btn.dataset.choice);
          let targetMatch = null;

          if(round === "r32") targetMatch = knockoutData.r32[idx];
          else if(round === "r16") targetMatch = knockoutData.r16[idx];
          else if(round === "qf") targetMatch = knockoutData.qf[idx];
          else if(round === "sf") targetMatch = knockoutData.sf[idx];
          else if(round === "third") targetMatch = knockoutData.third;
          else if(round === "final") targetMatch = knockoutData.final;

          if(!targetMatch) return;

          const selectedTeam = choice === 1 ? targetMatch.team1 : targetMatch.team2;
          if(!selectedTeam) return;

          targetMatch.winner = selectedTeam;
          propagateKnockout(knockoutData);
          renderKnockoutUI();
        };
      });
    }

    function renderSingleKoMatch(m, roundKey, idx){
      return `
        <div class="ko-match">
          <div class="ko-match-label">Match ${m.matchNo}</div>
          <div class="ko-buttons">
            <button class="winner-btn ${m.winner === m.team1 ? 'active' : ''}" data-round="${roundKey}" data-idx="${idx}" data-choice="1">
              ${m.team1 ? `<img src="${getFlagUrl(m.team1.team)}" alt=""> <span>${m.team1.team}</span>` : '<span>—</span>'}
            </button>
            <div class="vs">VS</div>
            <button class="winner-btn ${m.winner === m.team2 ? 'active' : ''}" data-round="${roundKey}" data-idx="${idx}" data-choice="2">
              ${m.team2 ? `<img src="${getFlagUrl(m.team2.team)}" alt=""> <span>${m.team2.team}</span>` : '<span>—</span>'}
            </button>
          </div>
        </div>
      `;
    }

    function goToKnockout(){
      const standings = computeStandings();
      const qualified = getQualifiedTeams(standings);

      if(qualified.length !== 32){
        alert("Complete all group stage matches first.");
        return;
      }

      knockoutData = buildKnockout(qualified);
      propagateKnockout(knockoutData);

      const bestThirds = getBestThirdPlacedTeams(standings);
      document.getElementById("bestThirdsPanel").innerHTML = `
        <strong>Best 8 Third-Placed Teams (Advanced)</strong><br>
        ${bestThirds.map(t => `${t.team} (${t.group}) — ${t.pts} pts`).join(" • ")}
      `;

      document.getElementById("groupStageView").classList.add("hidden");
      document.getElementById("knockoutView").classList.remove("hidden");
      renderKnockoutUI();
    }

    function initButtons(){
      document.getElementById("nextMatchBtn").onclick = () => {
        if(currentMatchIdx < allMatches.length - 1){
          currentMatchIdx++;
          selectedGroup = allMatches[currentMatchIdx].group;
          renderGroupTabs();
          renderMatchesPanel();
          renderProgress();
          saveProgress();
        } else if(currentMatchIdx === allMatches.length - 1){
          currentMatchIdx++;
          renderProgress();
          saveProgress();
        }
      };

      document.getElementById("backMatchBtn").onclick = () => {
        if(currentMatchIdx > 0){
          currentMatchIdx--;
          selectedGroup = allMatches[currentMatchIdx].group;
          renderGroupTabs();
          renderMatchesPanel();
          renderProgress();
          saveProgress();
        }
      };

      document.getElementById("randomResultBtn").onclick = () => {
        if(currentMatchIdx < allMatches.length){
          const m = allMatches[currentMatchIdx];
          m.homeScore = Math.floor(Math.random() * 5);
          m.awayScore = Math.floor(Math.random() * 5);
          renderMatchesPanel();
          renderStandingsPanel();
          renderProgress();
          saveProgress();
        }
      };

      document.getElementById("simulateRemainingBtn").onclick = () => {
        for(let i = currentMatchIdx; i < allMatches.length; i++){
          allMatches[i].homeScore = Math.floor(Math.random() * 4);
          allMatches[i].awayScore = Math.floor(Math.random() * 4);
        }
        currentMatchIdx = allMatches.length;
        renderMatchesPanel();
        renderStandingsPanel();
        renderProgress();
        saveProgress();
      };

      document.getElementById("resetBtn").onclick = () => {
        if(confirm("Reset the entire tournament?")){
          localStorage.removeItem("wc2026_predictor");
          buildFullSchedule();
          buildMatchesList();
          currentMatchIdx = 0;
          selectedGroup = "A";
          knockoutData = null;
          document.getElementById("groupStageView").classList.remove("hidden");
          document.getElementById("knockoutView").classList.add("hidden");
          renderGroupTabs();
          renderMatchesPanel();
          renderStandingsPanel();
          renderProgress();
        }
      };

      document.getElementById("toKnockoutBtn").onclick = goToKnockout;

      document.getElementById("backToGroupsBtn").onclick = () => {
        document.getElementById("knockoutView").classList.add("hidden");
        document.getElementById("groupStageView").classList.remove("hidden");
      };

      document.getElementById("classicModeBtn").onclick = () => {
        document.getElementById("classicModeBtn").classList.add("active");
        document.getElementById("bracketModeBtn").classList.remove("active");
        document.getElementById("groupStageView").classList.remove("hidden");
        document.getElementById("knockoutView").classList.add("hidden");
      };

      document.getElementById("bracketModeBtn").onclick = () => {
        document.getElementById("bracketModeBtn").classList.add("active");
        document.getElementById("classicModeBtn").classList.remove("active");
        if(allMatches.every(m => m.homeScore !== null && m.awayScore !== null)){
          goToKnockout();
        } else {
          alert("Please complete all group stage matches first.");
        }
      };

      document.getElementById("subtabs").querySelectorAll(".subtab").forEach(tab => {
        tab.onclick = () => {
          document.querySelectorAll(".subtab").forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          currentSubtab = tab.dataset.tab;
          renderStandingsPanel();
        };
      });
    }

    function init(){
      loadProgress();
      if(Object.keys(groupScores).length === 0){
        buildFullSchedule();
      }
      buildMatchesList();
      renderGroupTabs();
      renderMatchesPanel();
      renderStandingsPanel();
      renderProgress();
      initButtons();
      window.addEventListener("beforeunload", saveProgress);
    }

    init();
  </script>
</body>
</html>
