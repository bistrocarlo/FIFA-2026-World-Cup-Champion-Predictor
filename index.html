    // --------------------------------------------------------------
    // STATE
    // --------------------------------------------------------------
    let groupScores = {};      // { group: [ match objects with homeScore, awayScore ] }
    let allMatches = [];

    let knockoutData = null;
    let currentSubTab = "standings";

    // helper: dropdown options 0-10 and empty
    function scoreOptions(selected) {
        let html = `<option value="">–</option>`;
        for (let i = 0; i <= 10; i++) {
            html += `<option value="${i}" ${selected === i ? 'selected' : ''}>${i}</option>`;
        }
        return html;
    }

    // initialize / reset
    function initData() {
        groupScores = {};
        for (let g of GROUP_KEYS) {
            groupScores[g] = scheduleData[g].map(m => ({
                ...m,
                homeScore: null,
                awayScore: null,
                group: g
            }));
        }
        allMatches = [];
        for (let g of GROUP_KEYS) for (let m of groupScores[g]) allMatches.push(m);
        allMatches.sort((a,b)=> a.matchNo - b.matchNo);
        knockoutData = null;
    }

    // compute standings
    function computeStandings() {
        let standings = {};
        for (let g of GROUP_KEYS) {
            let stats = GROUPS[g].map((team, idx) => ({
                team, idx, played:0, wins:0, draws:0, losses:0, gf:0, ga:0, gd:0, pts:0
            }));
            for (let m of groupScores[g]) {
                if (m.homeScore === null || m.awayScore === null) continue;
                let hs = +m.homeScore, as = +m.awayScore;
                let home = stats[m.homeIdx], away = stats[m.awayIdx];
                home.played++; away.played++;
                home.gf += hs; home.ga += as;
                away.gf += as; away.ga += hs;
                if (hs > as) { home.wins++; home.pts+=3; away.losses++; }
                else if (as > hs) { away.wins++; away.pts+=3; home.losses++; }
                else { home.draws++; away.draws++; home.pts+=1; away.pts+=1; }
            }
            stats.forEach(s => s.gd = s.gf - s.ga);
            stats.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
            standings[g] = stats;
        }
        return standings;
    }

    function getBestThirdPlaced(standings) {
        let thirds = GROUP_KEYS.map(g => ({ ...standings[g][2], group: g }));
        thirds.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
        return thirds.slice(0,8);
    }

    function getQualifiedWithPosition(standings) {
        let bestThirds = getBestThirdPlaced(standings);
        let bestGroups = new Set(bestThirds.map(t => t.group));
        let qualified = [];
        for (let g of GROUP_KEYS) {
            qualified.push({ ...standings[g][0], group: g, pos: 'winner' });
            qualified.push({ ...standings[g][1], group: g, pos: 'runnerup' });
            if (bestGroups.has(g)) qualified.push({ ...standings[g][2], group: g, pos: 'third' });
        }
        return qualified;
    }

    // OFFICIAL FIFA 2026 BRACKET (exact pairing rules)
    function buildOfficialKnockout(qualifiedTeams) {
        let winnerMap = {}, runnerMap = {}, thirdMap = {};
        qualifiedTeams.forEach(t => {
            if (t.pos === 'winner') winnerMap[t.group] = t;
            else if (t.pos === 'runnerup') runnerMap[t.group] = t;
            else if (t.pos === 'third') thirdMap[t.group] = t;
        });
        function bestThirdFrom(groups) {
            let candidates = groups.filter(g => thirdMap[g]).map(g => thirdMap[g]);
            if (!candidates.length) return null;
            candidates.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
            return candidates[0];
        }
        const r32 = [
            { matchNo:73, team1: winnerMap['A'], team2: bestThirdFrom(['C','D','E']), winner: null },
            { matchNo:74, team1: winnerMap['B'], team2: bestThirdFrom(['A','D','E','F']), winner: null },
            { matchNo:75, team1: winnerMap['C'], team2: bestThirdFrom(['A','B','F']), winner: null },
            { matchNo:76, team1: winnerMap['D'], team2: bestThirdFrom(['B','E','F']), winner: null },
            { matchNo:77, team1: winnerMap['E'], team2: bestThirdFrom(['A','B','C','D']), winner: null },
            { matchNo:78, team1: winnerMap['F'], team2: bestThirdFrom(['A','B','C']), winner: null },
            { matchNo:79, team1: winnerMap['G'], team2: bestThirdFrom(['H','I','J','K','L']), winner: null },
            { matchNo:80, team1: winnerMap['H'], team2: bestThirdFrom(['G','I','J','K','L']), winner: null },
            { matchNo:81, team1: winnerMap['I'], team2: runnerMap['J'], winner: null },
            { matchNo:82, team1: winnerMap['J'], team2: runnerMap['I'], winner: null },
            { matchNo:83, team1: winnerMap['K'], team2: runnerMap['L'], winner: null },
            { matchNo:84, team1: winnerMap['L'], team2: runnerMap['K'], winner: null },
            { matchNo:85, team1: runnerMap['A'], team2: runnerMap['B'], winner: null },
            { matchNo:86, team1: runnerMap['C'], team2: runnerMap['D'], winner: null },
            { matchNo:87, team1: runnerMap['E'], team2: runnerMap['F'], winner: null },
            { matchNo:88, team1: runnerMap['G'], team2: runnerMap['H'], winner: null }
        ].filter(m => m.team1 && m.team2); // safety filter
        const r16 = Array.from({length:8}, (_,i) => ({ matchNo:89+i, team1:null, team2:null, winner:null }));
        const qf = Array.from({length:4}, (_,i) => ({ matchNo:97+i, team1:null, team2:null, winner:null }));
        const sf = Array.from({length:2}, (_,i) => ({ matchNo:101+i, team1:null, team2:null, winner:null }));
        const third = { matchNo:103, team1:null, team2:null, winner:null };
        const final = { matchNo:104, team1:null, team2:null, winner:null };
        return { r32, r16, qf, sf, third, final };
    }

    function propagateKnockout(k) {
        const w32 = k.r32.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);
        for (let i=0; i<k.r16.length; i++) {
            k.r16[i].team1 = w32[i*2] || null;
            k.r16[i].team2 = w32[i*2+1] || null;
            if (k.r16[i].winner && ![k.r16[i].team1, k.r16[i].team2].includes(k.r16[i].winner)) k.r16[i].winner = null;
        }
        const w16 = k.r16.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);
        for (let i=0; i<k.qf.length; i++) {
            k.qf[i].team1 = w16[i*2] || null;
            k.qf[i].team2 = w16[i*2+1] || null;
            if (k.qf[i].winner && ![k.qf[i].team1, k.qf[i].team2].includes(k.qf[i].winner)) k.qf[i].winner = null;
        }
        const wQF = k.qf.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);
        for (let i=0; i<k.sf.length; i++) {
            k.sf[i].team1 = wQF[i*2] || null;
            k.sf[i].team2 = wQF[i*2+1] || null;
            if (k.sf[i].winner && ![k.sf[i].team1, k.sf[i].team2].includes(k.sf[i].winner)) k.sf[i].winner = null;
        }
        const wSF = k.sf.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);
        const lSF = k.sf.map(m => m.winner ? (m.winner === m.team1 ? m.team2 : m.team1) : null);
        k.third.team1 = lSF[0] || null; k.third.team2 = lSF[1] || null;
        if (k.third.winner && ![k.third.team1, k.third.team2].includes(k.third.winner)) k.third.winner = null;
        k.final.team1 = wSF[0] || null; k.final.team2 = wSF[1] || null;
        if (k.final.winner && ![k.final.team1, k.final.team2].includes(k.final.winner)) k.final.winner = null;
    }

    // progress & save
    function updateProgress() {
        let played = allMatches.filter(m => m.homeScore !== null && m.awayScore !== null).length;
        let percent = (played / allMatches.length) * 100;
        document.getElementById('progressFill').style.width = percent + '%';
        document.getElementById('progressText').innerText = `${played} / ${allMatches.length} matches`;
        return played === allMatches.length;
    }

    function saveToLocal() {
        let data = { groupScores, currentGroup };
        localStorage.setItem('wc2026_predictor', JSON.stringify(data));
    }

    function loadFromLocal() {
        let raw = localStorage.getItem('wc2026_predictor');
        if (raw) {
            let data = JSON.parse(raw);
            groupScores = data.groupScores;
            currentGroup = data.currentGroup;
            // rebuild allMatches
            allMatches = [];
            for (let g of GROUP_KEYS) for (let m of groupScores[g]) allMatches.push(m);
            allMatches.sort((a,b)=> a.matchNo - b.matchNo);
        } else {
            initData();
        }
    }

    // rendering group matches
    function renderMatches() {
        let matches = groupScores[currentGroup] || [];
        let html = '';
        for (let m of matches) {
            let homeTeam = GROUPS[m.group][m.homeIdx];
            let awayTeam = GROUPS[m.group][m.awayIdx];
            html += `
                <div class="match-card">
                    <div class="match-time">📅 ${m.date} · ${m.stadium}, ${m.city}</div>
                    <div class="match-row">
                        <div class="team"><img class="flag" src="${getFlagUrl(homeTeam)}"><span class="team-name">${homeTeam}</span></div>
                        <div class="score-area" style="display:flex; gap:6px; align-items:center;">
                            <select class="score-box home-score" data-group="${m.group}" data-match="${m.matchNo}" data-side="home">${scoreOptions(m.homeScore)}</select>
                            <span class="dash">–</span>
                            <select class="score-box away-score" data-group="${m.group}" data-match="${m.matchNo}" data-side="away">${scoreOptions(m.awayScore)}</select>
                        </div>
                        <div class="team right"><span class="team-name">${awayTeam}</span><img class="flag" src="${getFlagUrl(awayTeam)}"></div>
                    </div>
                    <div class="match-meta">Match ${m.matchNo}</div>
                </div>
            `;
        }
        document.getElementById('matchesPanel').innerHTML = html;

        // attach events
        document.querySelectorAll('.score-box').forEach(sel => {
            sel.addEventListener('change', (e) => {
                let group = sel.dataset.group;
                let matchNo = parseInt(sel.dataset.match);
                let side = sel.dataset.side;
                let match = groupScores[group].find(x => x.matchNo === matchNo);
                if (match) {
                    let val = sel.value === '' ? null : parseInt(sel.value);
                    if (side === 'home') match.homeScore = val;
                    else match.awayScore = val;
                }
                renderStandings();
                updateProgress();
                renderMatches(); // re-render to keep current group
                saveToLocal();
            });
        });
    }

    function renderStandings() {
        let standings = computeStandings();
        let bestThirds = getBestThirdPlaced(standings);
        let bestThirdSet = new Set(bestThirds.map(t => `${t.group}-${t.team}`));
        let container = document.getElementById('standingsPanel');
        if (currentSubTab === 'standings') {
            let html = '';
            for (let g of GROUP_KEYS) {
                html += `<div class="group-title">Group ${g}</div>`;
                standings[g].forEach((row, idx) => {
                    let cls = '';
                    if (idx < 2) cls = 'qualifier';
                    else if (bestThirdSet.has(`${g}-${row.team}`)) cls = 'third-qual';
                    html += `
                        <div class="standings-row ${cls}">
                            <span>${idx+1}</span>
                            <div class="team-inline" style="display:flex; gap:8px; align-items:center;"><img src="${getFlagUrl(row.team)}" style="width:24px; height:24px; border-radius:50%;"> ${row.team}</div>
                            <span>${row.pts} pts</span>
                        </div>
                    `;
                });
            }
            container.innerHTML = html;
        } else if (currentSubTab === 'best3rd') {
            let html = `<div class="group-title">🏅 Best 8 third‑placed teams</div>`;
            bestThirds.forEach((t,i) => {
                html += `<div class="standings-row"><span>${i+1}</span><div><img src="${getFlagUrl(t.team)}" style="width:24px; border-radius:50%; vertical-align:middle; margin-right:8px;"> ${t.team} (${t.group})</div><span>${t.pts} pts</span></div>`;
            });
            container.innerHTML = html;
        } else if (currentSubTab === 'r32preview') {
            let allPlayed = allMatches.every(m => m.homeScore !== null && m.awayScore !== null);
            if (!allPlayed) {
                container.innerHTML = `<div class="standings-row" style="justify-content:center;">Complete all group matches to see R32 preview</div>`;
                return;
            }
            let qualified = getQualifiedWithPosition(standings);
            let tmpBracket = buildOfficialKnockout(qualified);
            let html = `<div class="group-title">🔮 Round of 32 (official pairings)</div>`;
            tmpBracket.r32.forEach(m => {
                html += `<div class="standings-row" style="justify-content:space-between;"><span><img src="${getFlagUrl(m.team1.team)}" width="22"> ${m.team1.team}</span> <span>vs</span> <span>${m.team2.team} <img src="${getFlagUrl(m.team2.team)}" width="22"></span></div>`;
            });
            container.innerHTML = html;
        }
    }

    // knockout rendering
    function renderKnockout() {
        if (!knockoutData) return;
        let panel = document.getElementById('knockoutPanel');
        let html = '';
        const rounds = [
            { name: 'Round of 32', key: 'r32' },
            { name: 'Round of 16', key: 'r16' },
            { name: 'Quarter-finals', key: 'qf' },
            { name: 'Semi-finals', key: 'sf' }
        ];
        for (let r of rounds) {
            html += `<div class="ko-round"><div class="ko-title">${r.name}</div>`;
            knockoutData[r.key].forEach((match, idx) => {
                html += `<div class="ko-match">
                            <div class="ko-match-label">Match ${match.matchNo}</div>
                            <div class="ko-buttons">
                                <button class="winner-btn ${match.winner === match.team1 ? 'active' : ''}" data-round="${r.key}" data-idx="${idx}" data-choice="1">
                                    ${match.team1 ? `<img src="${getFlagUrl(match.team1.team)}"> ${match.team1.team}` : '—'}
                                </button>
                                <div class="vs-small">VS</div>
                                <button class="winner-btn ${match.winner === match.team2 ? 'active' : ''}" data-round="${r.key}" data-idx="${idx}" data-choice="2">
                                    ${match.team2 ? `<img src="${getFlagUrl(match.team2.team)}"> ${match.team2.team}` : '—'}
                                </button>
                            </div>
                        </div>`;
            });
            html += `</div>`;
        }
        // third place & final
        html += `<div class="ko-round"><div class="ko-title">Third place</div>`;
        html += `<div class="ko-match"><div class="ko-buttons">
            <button class="winner-btn ${knockoutData.third.winner === knockoutData.third.team1 ? 'active' : ''}" data-round="third" data-idx="0" data-choice="1">${knockoutData.third.team1 ? `<img src="${getFlagUrl(knockoutData.third.team1.team)}"> ${knockoutData.third.team1.team}` : '—'}</button>
            <div class="vs-small">VS</div>
            <button class="winner-btn ${knockoutData.third.winner === knockoutData.third.team2 ? 'active' : ''}" data-round="third" data-idx="0" data-choice="2">${knockoutData.third.team2 ? `<img src="${getFlagUrl(knockoutData.third.team2.team)}"> ${knockoutData.third.team2.team}` : '—'}</button>
        </div></div></div>`;
        html += `<div class="ko-round"><div class="ko-title">🏆 FINAL</div>`;
        html += `<div class="ko-match"><div class="ko-buttons">
            <button class="winner-btn ${knockoutData.final.winner === knockoutData.final.team1 ? 'active' : ''}" data-round="final" data-idx="0" data-choice="1">${knockoutData.final.team1 ? `<img src="${getFlagUrl(knockoutData.final.team1.team)}"> ${knockoutData.final.team1.team}` : '—'}</button>
            <div class="vs-small">VS</div>
            <button class="winner-btn ${knockoutData.final.winner === knockoutData.final.team2 ? 'active' : ''}" data-round="final" data-idx="0" data-choice="2">${knockoutData.final.team2 ? `<img src="${getFlagUrl(knockoutData.final.team2.team)}"> ${knockoutData.final.team2.team}` : '—'}</button>
        </div></div></div>`;
        if (knockoutData.final.winner) html += `<div class="champion">🏆 WORLD CHAMPION: ${knockoutData.final.winner.team} 🏆</div>`;
        panel.innerHTML = html;

        // attach knockout click handlers
        document.querySelectorAll('.winner-btn').forEach(btn => {
            btn.onclick = () => {
                let round = btn.dataset.round;
                let idx = parseInt(btn.dataset.idx);
                let choice = parseInt(btn.dataset.choice);
                let target = null;
                if (round === 'r32') target = knockoutData.r32[idx];
                else if (round === 'r16') target = knockoutData.r16[idx];
                else if (round === 'qf') target = knockoutData.qf[idx];
                else if (round === 'sf') target = knockoutData.sf[idx];
                else if (round === 'third') target = knockoutData.third;
                else if (round === 'final') target = knockoutData.final;
                if (!target) return;
                let selected = choice === 1 ? target.team1 : target.team2;
                if (!selected) return;
                target.winner = selected;
                propagateKnockout(knockoutData);
                renderKnockout();
                saveToLocal();
            };
        });
    }

    function gotoKnockout() {
        let allPlayed = allMatches.every(m => m.homeScore !== null && m.awayScore !== null);
        if (!allPlayed) {
            alert('Finish all group stage matches first (72 matches).');
            return;
        }
        let standings = computeStandings();
        let qualified = getQualifiedWithPosition(standings);
        if (qualified.length !== 32) { alert('Error: not 32 qualified teams'); return; }
        knockoutData = buildOfficialKnockout(qualified);
        propagateKnockout(knockoutData);
        let bestThirds = getBestThirdPlaced(standings);
        document.getElementById('bestThirdsInfo').innerHTML = `<strong>✅ Best 8 third‑placed teams (advanced):</strong> ${bestThirds.map(t=>`${t.team} (${t.group} ${t.pts} pts)`).join(' · ')}`;
        document.getElementById('groupStageView').classList.add('hidden');
        document.getElementById('knockoutView').classList.remove('hidden');
        renderKnockout();
    }

    // UI event binding
    function bindEvents() {
        document.getElementById('resetBtn').onclick = () => {
            if (confirm('Reset all predictions?')) {
                initData();
                currentGroup = 'A';
                knockoutData = null;
                localStorage.removeItem('wc2026_predictor');
                renderGroupTabs();
                renderMatches();
                renderStandings();
                updateProgress();
                document.getElementById('groupStageView').classList.remove('hidden');
                document.getElementById('knockoutView').classList.add('hidden');
            }
        };
        document.getElementById('randomGroupMatchBtn').onclick = () => {
            let matches = groupScores[currentGroup];
            let unplayed = matches.filter(m => m.homeScore === null || m.awayScore === null);
            if (unplayed.length) {
                let m = unplayed[0];
                m.homeScore = Math.floor(Math.random() * 5);
                m.awayScore = Math.floor(Math.random() * 5);
                renderMatches();
                renderStandings();
                updateProgress();
                saveToLocal();
            } else {
                alert(`All matches in Group ${currentGroup} are already played.`);
            }
        };
        document.getElementById('simulateRemainingBtn').onclick = () => {
            for (let g of GROUP_KEYS) {
                for (let m of groupScores[g]) {
                    if (m.homeScore === null || m.awayScore === null) {
                        m.homeScore = Math.floor(Math.random() * 4);
                        m.awayScore = Math.floor(Math.random() * 4);
                    }
                }
            }
            renderMatches();
            renderStandings();
            updateProgress();
            saveToLocal();
        };
        document.getElementById('showKnockoutBtn').onclick = gotoKnockout;
        document.getElementById('backToGroupsBtn').onclick = () => {
            document.getElementById('knockoutView').classList.add('hidden');
            document.getElementById('groupStageView').classList.remove('hidden');
            renderStandings(); // refresh standings if needed
        };
        // sub tabs
        document.querySelectorAll('.sub-tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentSubTab = tab.dataset.tab;
                renderStandings();
            };
        });
    }

    function renderGroupTabs() {
        let tabsDiv = document.getElementById('groupTabs');
        tabsDiv.innerHTML = GROUP_KEYS.map(g => `<button class="group-tab ${currentGroup === g ? 'active' : ''}" data-group="${g}">GROUP ${g}</button>`).join('');
        tabsDiv.querySelectorAll('.group-tab').forEach(btn => {
            btn.onclick = () => {
                currentGroup = btn.dataset.group;
                renderGroupTabs();
                renderMatches();
                renderStandings();
                saveToLocal();
            };
        });
    }

    // initialization
    loadFromLocal();
    if (!groupScores || Object.keys(groupScores).length === 0) initData();
    allMatches = [];
    for (let g of GROUP_KEYS) for (let m of groupScores[g]) allMatches.push(m);
    allMatches.sort((a,b)=> a.matchNo - b.matchNo);
    renderGroupTabs();
    renderMatches();
    renderStandings();
    updateProgress();
    bindEvents();
    window.addEventListener('beforeunload', () => saveToLocal());
</script>
</body>
</html>
