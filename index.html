<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WC 2026 Predictor</title>
  <style>
    :root{
      --bg:#f8f9fa;
      --card:#ffffff;
      --soft:#f1f3f5;
      --blue:#007aff;
      --text:#1c1c1e;
      --muted:#8e8e93;
      --shadow:0 4px 20px rgba(0,0,0,.08);
      --radius:16px;
    }

    *{ box-sizing:border-box; margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
    body{ background:var(--bg); color:var(--text); padding:12px; line-height:1.4; }

    .app-shell{ max-width:1100px; margin:0 auto; }

    /* Hero - App Store style */
    .hero{
      background:var(--card);
      border-radius:20px;
      padding:24px;
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      gap:20px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .app-icon{
      width:120px;
      height:120px;
      background:linear-gradient(135deg, #1e90ff, #00bfff);
      border-radius:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 8px 25px rgba(30,144,255,.3);
      flex-shrink:0;
    }

    .app-icon img{
      width:72px;
      height:72px;
    }

    .hero-info h1{
      font-size:28px;
      font-weight:800;
      margin-bottom:4px;
    }

    .hero-info p{
      font-size:17px;
      color:var(--muted);
    }

    .start-btn{
      background:var(--blue);
      color:white;
      border:none;
      padding:12px 28px;
      font-size:17px;
      font-weight:600;
      border-radius:999px;
      margin-top:12px;
      cursor:pointer;
    }

    /* Controls */
    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    button{
      border:none;
      border-radius:999px;
      padding:10px 18px;
      font-weight:600;
      cursor:pointer;
    }

    .btn-blue{ background:var(--blue); color:white; }
    .btn-gray{ background:#e5e5ea; color:#1c1c1e; }
    .btn-green{ background:#34c759; color:white; }

    /* Segment */
    .segment{
      display:flex;
      background:#e5e5ea;
      border-radius:999px;
      padding:4px;
      width:fit-content;
      margin-bottom:16px;
    }

    .segment button{
      padding:8px 24px;
      background:transparent;
      border-radius:999px;
    }

    .segment button.active{
      background:white;
      box-shadow:0 2px 6px rgba(0,0,0,.1);
    }

    /* Group tabs */
    .group-tabs{
      display:flex;
      overflow-x:auto;
      gap:16px;
      padding-bottom:10px;
      margin-bottom:16px;
      scrollbar-width:none;
    }

    .group-tab{
      padding:8px 16px;
      font-weight:700;
      color:var(--muted);
      white-space:nowrap;
      border-bottom:3px solid transparent;
    }

    .group-tab.active{
      color:var(--blue);
      border-bottom:3px solid var(--blue);
    }

    /* Main content */
    .main-grid{
      display:grid;
      grid-template-columns:1.6fr 1fr;
      gap:20px;
    }

    @media (max-width: 980px){
      .main-grid{ grid-template-columns:1fr; }
    }

    .panel{
      background:var(--card);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:var(--shadow);
    }

    /* Match cards */
    .match-card{
      background:var(--soft);
      border-radius:16px;
      padding:16px;
      margin-bottom:14px;
    }

    .match-time{
      text-align:center;
      font-size:15px;
      font-weight:600;
      color:var(--muted);
      margin-bottom:12px;
    }

    .match-row{
      display:grid;
      grid-template-columns:1fr 90px 1fr;
      align-items:center;
      gap:12px;
    }

    .team-block{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }

    .team-flag{
      width:64px;
      height:64px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid #fff;
      box-shadow:0 2px 8px rgba(0,0,0,.1);
      margin-bottom:8px;
    }

    .team-name{
      font-size:15px;
      font-weight:700;
      line-height:1.2;
    }

    .score-area{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:28px;
      font-weight:300;
    }

    .score-box{
      width:54px;
      height:54px;
      background:white;
      border:2px solid #d0d0d8;
      border-radius:12px;
      text-align:center;
      font-size:24px;
      font-weight:400;
    }

    /* Standings */
    .standings-row{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 12px;
      background:white;
      border-radius:12px;
      margin-bottom:8px;
    }

    .standings-row img{
      width:28px;
      height:28px;
      border-radius:50%;
    }

    .pts{
      margin-left:auto;
      font-weight:700;
    }

    .hidden{ display:none !important; }
  </style>
</head>
<body>
  <div class="app-shell">

    <!-- App Store Style Hero -->

      <div class="app-icon">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Soccer_ball.svg/512px-Soccer_ball.svg.png" alt="WC 2026">
      </div>
      <div class="hero-info">
        <h1>WC 2026 Predictor</h1>
        <p>Predict 2026 World Champ</p>
        <button class="start-btn" id="startBtn">Start Predicting</button>
      </div>
    </div>

    <div class="controls">
      <button id="resetBtn" class="btn-gray">Reset Tournament</button>
      <button id="simulateRemainingBtn" class="btn-green">Simulate Remaining</button>
      <button id="toKnockoutBtn" class="btn-blue hidden">Go to Knockout</button>
    </div>

    <!-- Segment -->
    <div class="segment">
      <button id="classicModeBtn" class="active">Classic</button>
      <button id="bracketModeBtn">Bracket</button>

    <div class="group-tabs" id="groupTabs"></div>

    <div class="main-grid">
      <!-- Matches -->
      <div class="panel">
        <div id="matchesPanel"></div>
      </div>

      <!-- Standings -->
      <div class="panel">
        <div class="subtabs" id="subtabs">
          <button class="subtab active" data-tab="groups">GROUPS</button>
          <button class="subtab" data-tab="best3rd">BEST 3RD</button>
        </div>
        <div id="standingsPanel"></div>
      </div>
    </div>

    <!-- Knockout View -->
    <div id="knockoutView" class="hidden">
      <div class="panel">
        <div id="bestThirdsPanel"></div>
        <div id="knockoutPanel"></div>

    let groupScores = {};
    let allMatches = [];
    let currentMatchIdx = 0;
    let selectedGroup = "A";
    let knockoutData = null;
    let currentSubtab = "groups";

    function buildFullSchedule(){
      groupScores = {};
      for(const g of GROUP_KEYS){
        if(scheduleData[g]){
          groupScores[g] = scheduleData[g].map(m => ({
            ...m,
            homeScore: null,
            awayScore: null,
            group: g
          }));
        }
      }
    }

    function buildMatchesList(){
      allMatches = [];
      for(const g of GROUP_KEYS){
        for(const m of groupScores[g]) allMatches.push(m);
      }
      allMatches.sort((a,b) => a.matchNo - b.matchNo);
    }

    function saveProgress(){
      const data = {
        groupScores: JSON.parse(JSON.stringify(groupScores)),
        currentMatchIdx,
        selectedGroup
      };
      localStorage.setItem("wc2026_predictor", JSON.stringify(data));
    }

    function loadProgress(){
      const saved = localStorage.getItem("wc2026_predictor");
      if(saved){
        const data = JSON.parse(saved);
        groupScores = data.groupScores || {};
        currentMatchIdx = data.currentMatchIdx || 0;
        selectedGroup = data.selectedGroup || "A";
      }
    }

    function computeStandings(){
      const standings = {};
      for(const g of GROUP_KEYS){
        const stats = GROUPS[g].map((team, idx) => ({
          team, idx, played:0, wins:0, draws:0, losses:0, gf:0, ga:0, gd:0, pts:0
        }));

        for(const m of groupScores[g]){
          const hs = Number(m.homeScore) || 0;
          const as = Number(m.awayScore) || 0;
          const home = stats[m.homeIdx];
          const away = stats[m.awayIdx];

          home.played++;
          away.played++;
          home.gf += hs;
          home.ga += as;
          away.gf += as;
          away.ga += hs;

          if(hs > as){
            home.wins++; home.pts += 3;
            away.losses++;
          } else if(as > hs){
            away.wins++; away.pts += 3;
            home.losses++;
          } else {
            home.draws++; away.draws++;
            home.pts += 1; away.pts += 1;
          }
        }

        stats.forEach(s => s.gd = s.gf - s.ga);
        stats.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
        standings[g] = stats;
      }
      return standings;
    }

    function getBestThirdPlacedTeams(standings){
      const thirds = GROUP_KEYS.map(g => ({...standings[g][2], group:g}));
      thirds.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
      return thirds.slice(0,8);
    }

    function getQualifiedTeams(standings){
      const bestThirds = getBestThirdPlacedTeams(standings);
      const bestGroups = new Set(bestThirds.map(t => t.group));
      const qualified = [];

      for(const g of GROUP_KEYS){
        qualified.push({...standings[g][0], group:g});
        qualified.push({...standings[g][1], group:g});
        if(bestGroups.has(g)){
          qualified.push({...standings[g][2], group:g});
        }
      }

      qualified.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
      return qualified;
    }

    function buildKnockout(qualified){
      const r32 = [];
      for(let i = 0; i < 16; i++){
        r32.push({
          matchNo: 73 + i,
          team1: qualified[i],
          team2: qualified[31 - i],
          winner: null
        });
      }

      const r16 = Array.from({length:8}, (_,i) => ({matchNo:89+i, team1:null, team2:null, winner:null}));
      const qf = Array.from({length:4}, (_,i) => ({matchNo:97+i, team1:null, team2:null, winner:null}));
      const sf = Array.from({length:2}, (_,i) => ({matchNo:101+i, team1:null, team2:null, winner:null}));
      const third = {matchNo:103, team1:null, team2:null, winner:null};
      const final = {matchNo:104, team1:null, team2:null, winner:null};

      return {r32, r16, qf, sf, third, final};
    }

    function propagateKnockout(k){
      const winners32 = k.r32.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);

      for(let i=0; i<k.r16.length; i++){
        k.r16[i].team1 = winners32[i*2] || null;
        k.r16[i].team2 = winners32[i*2+1] || null;
        if(k.r16[i].winner && ![k.r16[i].team1, k.r16[i].team2].includes(k.r16[i].winner)) k.r16[i].winner = null;
      }

      const winners16 = k.r16.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);

      for(let i=0; i<k.qf.length; i++){
        k.qf[i].team1 = winners16[i*2] || null;
        k.qf[i].team2 = winners16[i*2+1] || null;
        if(k.qf[i].winner && ![k.qf[i].team1, k.qf[i].team2].includes(k.qf[i].winner)) k.qf[i].winner = null;
      }

      const winnersQF = k.qf.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);

      for(let i=0; i<k.sf.length; i++){
        k.sf[i].team1 = winnersQF[i*2] || null;
        k.sf[i].team2 = winnersQF[i*2+1] || null;
        if(k.sf[i].winner && ![k.sf[i].team1, k.sf[i].team2].includes(k.sf[i].winner)) k.sf[i].winner = null;
      }

      const winnersSF = k.sf.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);
      const losersSF = k.sf.map(m => {
        if(!m.team1 || !m.team2 || !m.winner) return null;
        return m.winner === m.team1 ? m.team2 : m.team1;
      });

      k.third.team1 = losersSF[0] || null;
      k.third.team2 = losersSF[1] || null;
      if(k.third.winner && ![k.third.team1, k.third.team2].includes(k.third.winner)) k.third.winner = null;

      k.final.team1 = winnersSF[0] || null;
      k.final.team2 = winnersSF[1] || null;
      if(k.final.winner && ![k.final.team1, k.final.team2].includes(k.final.winner)) k.final.winner = null;
    }

    function dropdownOptions(selected){
      let html = "";
      for(let i=0; i<=10; i++){
        html += `<option value="${i}" ${Number(selected)===i ? "selected":""}>${i}</option>`;
      }
      return html;
    }

    function renderGroupTabs(){
      const holder = document.getElementById("groupTabs");
      holder.innerHTML = GROUP_KEYS.map(g => `
        <button class="group-tab ${selectedGroup===g ? 'active' : ''}" data-group="${g}">GROUP ${g}</button>
      `).join("");

      holder.querySelectorAll(".group-tab").forEach(btn => {
        btn.onclick = () => {
          selectedGroup = btn.dataset.group;
          renderGroupTabs();
          renderMatchesPanel();
          renderStandingsPanel();
        };
      });
    }

    function renderMatchesPanel(){
      const box = document.getElementById("matchesPanel");
      const matches = groupScores[selectedGroup] || [];

      box.innerHTML = matches.map((m) => {
        const home = GROUPS[m.group][m.homeIdx];
        const away = GROUPS[m.group][m.awayIdx];
        const isCurrent = allMatches[currentMatchIdx] && allMatches[currentMatchIdx].matchNo === m.matchNo;

        return `
          <div class="match-card" style="${isCurrent ? 'outline:3px solid rgba(0,122,255,.2);' : ''}">
            <div class="match-time">${m.date} • ${m.stadium}</div>
            <div class="match-row">
              <div class="team-block">
                <img class="team-flag" src="${getFlagUrl(home)}" alt="${home}">
                <div class="team-name">${home}</div>
              </div>

              <div class="score-area">
                <select class="score-box" data-group="${m.group}" data-match="${m.matchNo}" data-side="home">
                  ${dropdownOptions(m.homeScore)}
                </select>
                <div style="font-size:28px; color:#888;">-</div>
                <select class="score-box" data-group="${m.group}" data-match="${m.matchNo}" data-side="away">
                  ${dropdownOptions(m.awayScore)}
                </select>
              </div>

              <div class="team-block">
                <img class="team-flag" src="${getFlagUrl(away)}" alt="${away}">
                <div class="team-name">${away}</div>
              </div>
            </div>
            <div style="text-align:center; margin-top:10px; font-size:13px; color:var(--muted);">Match ${m.matchNo} • ${m.city}</div>
          </div>
        `;
      }).join("");

      box.querySelectorAll(".score-box").forEach(sel => {
        sel.addEventListener("change", () => {
          const group = sel.dataset.group;
          const matchNo = Number(sel.dataset.match);
          const side = sel.dataset.side;
          const match = groupScores[group].find(x => x.matchNo === matchNo);
          if(match){
            if(side === "home") match.homeScore = Number(sel.value);
            else match.awayScore = Number(sel.value);
          }
          renderProgress();
          renderStandingsPanel();
          renderMatchesPanel();
          saveProgress();
        });
      });
    }

    function renderStandingsPanel(){
      const standings = computeStandings();
      const bestThirds = getBestThirdPlacedTeams(standings);
      const box = document.getElementById("standingsPanel");

      let html = "";

      if(currentSubtab === "groups"){
        for(const g of GROUP_KEYS){
          html += `<div style="margin-bottom:20px;"><div style="font-weight:700; margin-bottom:10px;">GROUP ${g}</div>`;
          html += standings[g].map((row, idx) => `
            <div class="standings-row">
              <span style="width:24px; text-align:center; font-weight:700;">${idx+1}</span>
              <img src="${getFlagUrl(row.team)}" alt="${row.team}">
              <span style="font-weight:600;">${row.team}</span>
              <span class="pts">${row.pts}</span>
            </div>
          `).join("");
          html += `</div>`;
        }
      } else if(currentSubtab === "best3rd"){
        html = `<div style="font-weight:700; margin-bottom:12px;">Best 8 Third-Placed Teams</div>`;
        html += bestThirds.map((t,i) => `
          <div class="standings-row">
            <span style="width:24px; text-align:center; font-weight:700;">${i+1}</span>
            <img src="${getFlagUrl(t.team)}" alt="${t.team}">
            <span style="font-weight:600;">${t.team} (${t.group})</span>
            <span class="pts">${t.pts}</span>
          </div>
        `).join("");
      }

      box.innerHTML = html;
    }

    function renderProgress(){
      const played = allMatches.filter(m => m.homeScore !== null && m.awayScore !== null).length;
      document.getElementById("toKnockoutBtn").classList.toggle("hidden", played < allMatches.length);
    }

    function initButtons(){
      document.getElementById("resetBtn").onclick = () => {
        if(confirm("Reset everything?")){
          localStorage.removeItem("wc2026_predictor");
          location.reload();
        }
      };

      document.getElementById("simulateRemainingBtn").onclick = () => {
        for(let i = currentMatchIdx; i < allMatches.length; i++){
          allMatches[i].homeScore = Math.floor(Math.random() * 4);
          allMatches[i].awayScore = Math.floor(Math.random() * 4);
        }
        currentMatchIdx = allMatches.length;
        renderMatchesPanel();
        renderStandingsPanel();
        renderProgress();
        saveProgress();
      };

      document.getElementById("toKnockoutBtn").onclick = () => {
        alert("Knockout stage coming in next update!");
      };

      document.getElementById("startBtn").onclick = () => {
        document.getElementById("startBtn").textContent = "Enjoy the tournament!";
      };

      // Subtabs
      document.querySelectorAll(".subtab").forEach(tab => {
        tab.onclick = () => {
          document.querySelectorAll(".subtab").forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          currentSubtab = tab.dataset.tab;
          renderStandingsPanel();
        };
      });
    }

    function init(){
      loadProgress();
      if(Object.keys(groupScores).length === 0){
        buildFullSchedule();
      }
      buildMatchesList();

      renderGroupTabs();
      renderMatchesPanel();
      renderStandingsPanel();
      renderProgress();
      initButtons();
    }

    init();
  </script>
</body>
</html>
