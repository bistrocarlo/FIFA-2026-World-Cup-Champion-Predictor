<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WC 2026 Predictor - Official Bracket</title>
  <style>
    :root{
      --bg:#f2f2f7;
      --card:#ffffff;
      --soft:#f7f7fa;
      --line:#e5e5ea;
      --text:#111111;
      --muted:#8e8e93;
      --blue:#11c5d9;
      --tab:#f3f3f6;
      --shadow:0 8px 24px rgba(0,0,0,.06);
      --radius:24px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
    body{background:var(--bg);color:var(--text);padding:14px;}
    .app-shell{max-width:1200px;margin:0 auto;}
    .hero{background:var(--card);border-radius:34px;padding:22px 18px 18px;box-shadow:var(--shadow);border:1px solid #ededf2;margin-bottom:16px;}
    .hero-title{font-size:clamp(1.9rem,4vw,3.25rem);line-height:1;font-weight:800;letter-spacing:-0.03em;}
    .hero-sub{font-size:clamp(1rem,2vw,1.6rem);color:var(--muted);font-weight:500;letter-spacing:-0.02em;margin-top:4px;}
    .pill{display:inline-flex;align-items:center;gap:8px;background:#ececef;color:#5d5d64;border-radius:999px;padding:10px 16px;font-size:.95rem;font-weight:600;margin-top:14px;}
    .progress-bar{height:8px;background:#e5e5ea;border-radius:999px;margin:16px 0 6px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg, #11c5d9, #0a84ff);transition:width 0.5s cubic-bezier(0.4,0,0.2,1);}
    button{border:none;border-radius:999px;padding:12px 18px;font-size:.94rem;font-weight:700;cursor:pointer;transition:.2s ease;}
    button:hover{transform:translateY(-1px);filter:brightness(0.98);}
    .btn-orange{background:#c86d22;color:#fff;}
    .btn-blue{background:#0a84ff;color:#fff;}
    .btn-dark{background:#2c2c2e;color:#fff;}
    .btn-gray{background:#e9e9ee;color:#222;}
    .btn-green{background:#2f8f54;color:#fff;}
    .segment-wrap,.panel{background:var(--card);border-radius:28px;padding:14px;box-shadow:var(--shadow);border:1px solid #ededf2;margin-bottom:16px;}
    .segment{display:grid;grid-template-columns:1fr 1fr;background:var(--tab);border-radius:18px;padding:4px;gap:4px;max-width:440px;margin:0 auto 14px;}
    .segment button{background:transparent;color:#444;border-radius:14px;padding:11px;font-weight:700;}
    .segment button.active{background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.1);}
    .group-tabs,.subtabs{display:flex;gap:18px;overflow:auto;padding-bottom:8px;scrollbar-width:none;}
    .group-tab,.subtab{background:none;padding:0 0 10px;color:#54545a;font-size:1.08rem;font-weight:700;white-space:nowrap;border-bottom:4px solid transparent;}
    .group-tab.active,.subtab.active{color:var(--blue);border-bottom-color:var(--blue);}
    .main-grid{display:grid;grid-template-columns:1.35fr 1fr;gap:16px;align-items:start;}
    @media (max-width:980px){.main-grid{grid-template-columns:1fr;}}
    .match-card{background:var(--soft);border-radius:22px;padding:16px 14px 14px;margin-bottom:14px;border:1px solid #ededf2;}
    .match-time{text-align:center;font-size:1rem;font-weight:800;margin-bottom:14px;letter-spacing:-0.01em;}
    .match-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;}
    .team-side{display:flex;align-items:center;gap:10px;min-width:0;}
    .team-side.right{justify-content:flex-end;text-align:right;}
    .team-flag{width:52px;height:52px;object-fit:cover;border-radius:50%;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.08);border:2px solid #f0f0f5;flex-shrink:0;}
    .team-name{font-size:1rem;font-weight:800;line-height:1.12;word-break:break-word;}
    .score-area{display:flex;align-items:center;gap:8px;justify-content:center;flex-shrink:0;}
    .score-box{width:56px;height:56px;border-radius:14px;border:2px solid #d0d0d8;background:#fff;text-align:center;font-size:1.75rem;font-weight:400;color:#555;appearance:none;}
    .dash{font-size:2rem;color:#888;margin-top:-4px;width:10px;text-align:center;}
    .match-meta{text-align:center;margin-top:12px;color:#8a8a92;font-weight:700;font-size:0.89rem;}
    .standings-card{background:var(--soft);border-radius:22px;padding:14px;border:1px solid #ededf2;margin-bottom:14px;}
    .standings-group-title{font-size:1.1rem;font-weight:900;letter-spacing:-0.02em;margin-bottom:12px;}
    .standings-row{display:grid;grid-template-columns:30px minmax(0,1fr) 64px;align-items:center;gap:10px;background:#fff;border:1px solid #e8e8ee;border-radius:16px;padding:10px 12px;margin-bottom:8px;}
    .standings-row.qual{background:#f0fff7;}
    .standings-row.third{background:#f4fbff;}
    .team-inline{display:flex;align-items:center;gap:10px;min-width:0;font-weight:800;}
    .team-inline img{width:26px;height:26px;border-radius:50%;object-fit:cover;border:1px solid #ececf1;flex-shrink:0;}
    .rank{font-weight:900;color:#666;text-align:center;}
    .pts{font-weight:900;white-space:nowrap;text-align:right;}
    .ko-round{margin-bottom:24px;}
    .ko-title{font-size:1.22rem;font-weight:900;margin-bottom:14px;letter-spacing:-0.02em;}
    .ko-match{background:var(--soft);border-radius:24px;padding:18px;border:1px solid #ededf2;margin-bottom:14px;}
    .ko-match-label{text-align:center;font-weight:900;margin-bottom:14px;color:#666;}
    .ko-buttons{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;}
    @media (max-width:680px){.ko-buttons{grid-template-columns:1fr;}}
    .vs{font-weight:900;color:#8a8a92;text-align:center;}
    .winner-btn{background:#fff;border:1px solid #dddde5;border-radius:999px;padding:14px 16px;display:flex;align-items:center;justify-content:center;gap:12px;min-height:60px;font-weight:800;font-size:1rem;width:100%;}
    .winner-btn img{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid #ececf1;}
    .winner-btn.active{background:#111;color:#fff;border-color:#111;}
    .champion-box{margin:24px 0;background:#fff7d7;border:2px solid #f0df9b;border-radius:26px;padding:24px;text-align:center;font-size:1.45rem;font-weight:900;box-shadow:0 4px 20px rgba(240,223,155,.3);}
    .hidden{display:none !important;}
    @media (max-width:640px){body{padding:10px;}.hero{padding:18px 14px 16px;border-radius:28px;}/* other mobile styles unchanged */}
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="hero">
      <div class="hero-title">WC 2026 Predictor</div>
      <div class="hero-sub">Official FIFA 2026 Bracket</div>
      <div class="pill">United States · Canada · Mexico</div>

      <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width:0%"></div>
      </div>
      <div id="progressText" style="text-align:center; font-size:0.95rem; color:var(--muted); font-weight:600;">0 of 72 matches played</div>

      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:18px;">
        <button id="resetBtn" class="btn-orange">Reset Tournament</button>
        <button id="randomResultBtn" class="btn-dark">Random This Match</button>
        <button id="simulateRemainingBtn" class="btn-green">Simulate Remaining</button>
        <button id="toKnockoutBtn" class="btn-blue hidden">Go to Knockout Stage →</button>
      </div>
    </div>

    <div id="groupStageView">
      <div class="segment-wrap">
        <div class="segment">
          <button id="classicModeBtn" class="active">Classic</button>
          <button id="bracketModeBtn">Bracket</button>
        </div>
        <div class="group-tabs" id="groupTabs"></div>
      </div>

      <div class="main-grid">
        <div class="panel">
          <div id="matchesPanel"></div>
        </div>

        <div class="panel">
          <div class="subtabs" id="subtabs">
            <button class="subtab active" data-tab="groups">GROUPS</button>
            <button class="subtab" data-tab="best3rd">BEST 3RD</button>
            <button class="subtab" data-tab="r32">R32 PREVIEW</button>
          </div>
          <div id="standingsPanel"></div>
        </div>
      </div>
    </div>

    <div id="knockoutView" class="hidden">
      <div class="panel">
        <div id="bestThirdsPanel" style="background:#f4fbff; border:1px solid #c0d8ff; border-radius:24px; padding:20px; margin-bottom:20px;"></div>
        <div id="knockoutPanel"></div>
        <div style="text-align:center; margin-top:24px;">
          <button id="backToGroupsBtn" class="btn-blue">← Back to Groups</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const GROUPS = {
      A: ["Mexico","South Africa","South Korea","Czechia"],
      B: ["Canada","Bosnia and Herzegovina","Qatar","Switzerland"],
      C: ["Brazil","Morocco","Haiti","Scotland"],
      D: ["United States","Paraguay","Australia","Turkey"],
      E: ["Germany","Curacao","Ivory Coast","Ecuador"],
      F: ["Netherlands","Japan","Sweden","Tunisia"],
      G: ["Belgium","Egypt","Iran","New Zealand"],

      I: ["France","Senegal","Iraq","Norway"],

      "Iraq":"iq","Norway":"no","Argentina":"ar","Algeria":"dz","Austria":"at","Jordan":"jo","Portugal":"pt",
      "DR Congo":"cd","Uzbekistan":"uz","Colombia":"co","England":"gb-eng","Croatia":"hr","Ghana":"gh","Panama":"pa"

      if(code === "gb-sct") return "https://flagcdn.com/w80/gb-sct.png";
      if(code === "gb-eng") return "https://flagcdn.com/w80/gb-eng.png";

    function buildFullSchedule(){
      groupScores = {};
      for(const g of GROUP_KEYS){
        if(scheduleData[g]){
          groupScores[g] = scheduleData[g].map(m => ({...m, homeScore: null, awayScore: null, group: g}));
        }
      }
    }

    function buildMatchesList(){
      allMatches = [];
      for(const g of GROUP_KEYS){
        for(const m of groupScores[g]) allMatches.push(m);
      }
      allMatches.sort((a,b) => a.matchNo - b.matchNo);
    }

    function saveProgress(){
      const data = {groupScores: JSON.parse(JSON.stringify(groupScores)), selectedGroup};
      localStorage.setItem("wc2026_predictor", JSON.stringify(data));
    }

    function loadProgress(){
      const saved = localStorage.getItem("wc2026_predictor");
      if(saved){
        const data = JSON.parse(saved);
        groupScores = data.groupScores || {};
        selectedGroup = data.selectedGroup || "A";
      }
    }

      const thirds = GROUP_KEYS.map(g => ({...standings[g][2], group:g}));
      thirds.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.team.localeCompare(b.team));
      return thirds.slice(0,8);
    }

    function getQualifiedTeamsWithPositions(standings){
      const bestThirds = getBestThirdPlacedTeams(standings);
      const bestGroups = new Set(bestThirds.map(t => t.group));
      const qualified = [];
      for(const g of GROUP_KEYS){
        qualified.push({...standings[g][0], group:g, position: 'winner'});
        qualified.push({...standings[g][1], group:g, position: 'runnerup'});
        if(bestGroups.has(g)) qualified.push({...standings[g][2], group:g, position: 'third'});
      }
      return qualified;
    }

    // === OFFICIAL FIFA 2026 R32 PAIRINGS ===
    function buildOfficialKnockout(qualifiedTeamsWithPos) {
      const winners = qualifiedTeamsWithPos.filter(t => t.position === 'winner');
      const runnersUp = qualifiedTeamsWithPos.filter(t => t.position === 'runnerup');
      const thirds = qualifiedTeamsWithPos.filter(t => t.position === 'third');

      const groupOrder = GROUP_KEYS;
      winners.sort((a,b) => groupOrder.indexOf(a.group) - groupOrder.indexOf(b.group));
      runnersUp.sort((a,b) => groupOrder.indexOf(a.group) - groupOrder.indexOf(b.group));
      const sortedThirds = [...thirds].sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);

      const teamMap = {};
      winners.forEach(t => teamMap[`${t.group}1`] = t);
      runnersUp.forEach(t => teamMap[`${t.group}2`] = t);
      sortedThirds.forEach(t => teamMap[`${t.group}3`] = t);

      // Official pairings (from FIFA schedule)
      const r32 = [
        { matchNo:73, team1: teamMap['A2'], team2: teamMap['B2'], winner: null },                    // 2A vs 2B
        { matchNo:74, team1: teamMap['E1'], team2: sortedThirds.find(t=>['A','B','C','D','F'].includes(t.group)) || sortedThirds[0], winner: null },
        { matchNo:75, team1: teamMap['F1'], team2: teamMap['C2'], winner: null },                    // 1F vs 2C
        { matchNo:76, team1: teamMap['C1'], team2: teamMap['F2'], winner: null },                    // 1C vs 2F
        { matchNo:77, team1: teamMap['I1'], team2: sortedThirds.find(t=>['C','D','F','G','H'].includes(t.group)) || sortedThirds[1], winner: null },
        { matchNo:78, team1: teamMap['E2'], team2: teamMap['I2'], winner: null },                    // 2E vs 2I
        { matchNo:79, team1: teamMap['A1'], team2: sortedThirds.find(t=>['C','E','F','H','I'].includes(t.group)) || sortedThirds[2], winner: null },
        { matchNo:80, team1: teamMap['L1'], team2: sortedThirds.find(t=>['E','H','I','J','K'].includes(t.group)) || sortedThirds[3], winner: null },
        { matchNo:81, team1: teamMap['D1'], team2: sortedThirds.find(t=>['B','E','F','I','J'].includes(t.group)) || sortedThirds[4], winner: null },
        { matchNo:82, team1: teamMap['G1'], team2: sortedThirds.find(t=>['A','B','D','G','H'].includes(t.group)) || sortedThirds[5], winner: null },
        { matchNo:83, team1: teamMap['K2'], team2: teamMap['L2'], winner: null },
        { matchNo:84, team1: teamMap['H1'], team2: teamMap['J2'], winner: null },
        { matchNo:85, team1: teamMap['B1'], team2: sortedThirds.find(t=>['E','F','G','I','J'].includes(t.group)) || sortedThirds[6], winner: null },
        { matchNo:86, team1: teamMap['J1'], team2: teamMap['H2'], winner: null },
        { matchNo:87, team1: teamMap['K1'], team2: sortedThirds.find(t=>['G','H','I','J','L'].includes(t.group)) || sortedThirds[7], winner: null },
        { matchNo:88, team1: teamMap['G2'], team2: teamMap['D2'], winner: null }
      ];

      const r16 = Array.from({length:8}, (_,i) => ({matchNo:89+i, team1:null, team2:null, winner:null}));
      const qf  = Array.from({length:4}, (_,i) => ({matchNo:97+i, team1:null, team2:null, winner:null}));
      const sf  = Array.from({length:2}, (_,i) => ({matchNo:101+i, team1:null, team2:null, winner:null}));
      const third = {matchNo:103, team1:null, team2:null, winner:null};
      const final = {matchNo:104, team1:null, team2:null, winner:null};

      return {r32, r16, qf, sf, third, final};
    }

    function propagateKnockout(k){ /* your original propagation function is fine */

    }

    // Rest of your rendering functions (renderGroupTabs, renderMatchesPanel, etc.) remain the same.
    // Just make sure renderStandingsPanel uses the updated buildOfficialKnockout.

    function init(){ /* your original init with removed next/back buttons */ 
      loadProgress();
      if(Object.keys(groupScores).length === 0) buildFullSchedule();
      buildMatchesList();
      renderGroupTabs();
      renderMatchesPanel();
      renderStandingsPanel();
      renderProgress();
      initButtons();
    }

    // ... (include all your other functions: render*, dropdownOptions, etc.)

    window.addEventListener("beforeunload", saveProgress);
    init();
  </script>
</body>
</html>
