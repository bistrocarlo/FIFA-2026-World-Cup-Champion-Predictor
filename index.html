<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WC 2026 Predictor</title>
  <style>
    :root{
      --bg:#f2f2f7;
      --card:#ffffff;
      --soft:#f7f7fa;
      --line:#e5e5ea;
      --text:#111111;
      --muted:#8e8e93;
      --blue:#11c5d9;
      --tab:#f3f3f6;
      --shadow:0 8px 24px rgba(0,0,0,.06);
      --radius:24px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--text);
      padding:18px;
    }

    .app-shell{
      max-width:1200px;
      margin:0 auto;
    }

    .hero{
      background:var(--card);
      border-radius:34px;
      padding:26px 22px 20px;
      box-shadow:var(--shadow);
      border:1px solid #ededf2;
      margin-bottom:18px;
    }

    .hero-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
    }

    .hero-title{
      font-size:clamp(2rem,4vw,3.25rem);
      line-height:1;
      font-weight:800;
      letter-spacing:-0.03em;
      margin-bottom:10px;
    }

    .hero-sub{
      font-size:clamp(1.05rem,2vw,1.6rem);
      color:var(--muted);
      font-weight:500;
      letter-spacing:-0.02em;
    }

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background:#ececef;
      color:#5d5d64;
      border-radius:999px;
      padding:10px 16px;
      font-size:.98rem;
      font-weight:600;
      margin-top:14px;
    }

    .hero-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    button{
      border:none;
      border-radius:999px;
      padding:13px 18px;
      font-size:.95rem;
      font-weight:700;
      cursor:pointer;
      transition:.18s ease;
    }

    button:hover{
      transform:translateY(-1px);
      filter:brightness(.98);
    }

    .btn-orange{ background:#c86d22; color:#fff; }
    .btn-blue{ background:#0a84ff; color:#fff; }
    .btn-dark{ background:#2c2c2e; color:#fff; }
    .btn-gray{ background:#e9e9ee; color:#222; }
    .btn-green{ background:#2f8f54; color:#fff; }

    .divider{
      height:4px;
      background:#2f2f32;
      margin:22px 0 0;
      opacity:.9;
    }

    .segment-wrap{
      background:var(--card);
      border-radius:30px;
      padding:14px;
      box-shadow:var(--shadow);
      border:1px solid #ededf2;
      margin-bottom:18px;
    }

    .segment{
      display:grid;
      grid-template-columns:1fr 1fr;
      background:var(--tab);
      border-radius:18px;
      padding:4px;
      gap:4px;
      max-width:430px;
      margin:0 auto 16px;
    }

    .segment button{
      background:transparent;
      color:#444;
      border-radius:14px;
      padding:11px 14px;
      font-weight:700;
    }

    .segment button.active{
      background:#fff;
      box-shadow:0 1px 2px rgba(0,0,0,.08);
    }

    .group-tabs{
      display:flex;
      gap:18px;
      overflow:auto;
      padding:0 2px 6px;
      scrollbar-width:none;
    }

    .group-tabs::-webkit-scrollbar{ display:none; }

    .group-tab{
      background:none;
      border-radius:0;
      padding:0 0 10px;
      color:#54545a;
      font-size:1.25rem;
      font-weight:700;
      white-space:nowrap;
      border-bottom:4px solid transparent;
    }

    .group-tab.active{
      color:var(--blue);
      border-bottom-color:var(--blue);
    }

    .main-grid{
      display:grid;
      grid-template-columns:1.3fr .9fr;
      gap:18px;
      align-items:start;
    }

    .panel{
      background:var(--card);
      border-radius:30px;
      padding:18px;
      box-shadow:var(--shadow);
      border:1px solid #ededf2;
    }

    .match-card{
      background:var(--soft);
      border-radius:24px;
      padding:18px 16px 16px;
      margin-bottom:14px;
      border:1px solid #ededf2;
    }

    .match-time{
      text-align:center;
      font-size:1.05rem;
      font-weight:800;
      letter-spacing:-0.02em;
      margin-bottom:14px;
    }

    .match-row{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      align-items:center;
      gap:14px;
    }

    .team-block{
      text-align:center;
    }

    .team-flag{
      width:74px;
      height:74px;
      object-fit:cover;
      border-radius:50%;
      background:#fff;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
      margin:0 auto 10px;
      border:1px solid #ececf1;
    }

    .team-name{
      font-size:1rem;
      font-weight:800;
      line-height:1.15;
      letter-spacing:-0.02em;
    }

    .score-area{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .score-box{
      width:58px;
      height:58px;
      border-radius:14px;
      border:1px solid #dedee5;
      background:#fff;
      text-align:center;
      font-size:1.9rem;
      font-weight:300;
      color:#85858d;
      appearance:none;
      -webkit-appearance:none;
    }

    .dash{
      font-size:2rem;
      font-weight:400;
      color:#54545a;
      margin-top:-4px;
    }

    .match-meta{
      text-align:center;
      margin-top:10px;
      color:#8a8a92;
      font-weight:700;
      font-size:.9rem;
    }

    .controls{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:6px;
    }

    .section-title{
      font-size:1.65rem;
      font-weight:800;
      letter-spacing:-0.03em;
      margin-bottom:14px;
    }

    .subtabs{
      display:flex;
      gap:18px;
      overflow:auto;
      padding-bottom:4px;
      margin-bottom:14px;
      scrollbar-width:none;
    }

    .subtabs::-webkit-scrollbar{ display:none; }

    .subtab{
      background:none;
      padding:0 0 8px;
      border-radius:0;
      color:#c0c0c6;
      font-size:1rem;
      font-weight:800;
      white-space:nowrap;
      border-bottom:4px solid transparent;
    }

    .subtab.active{
      color:var(--blue);
      border-color:var(--blue);
    }

    .standings-card{
      background:var(--soft);
      border-radius:22px;
      padding:14px;
      border:1px solid #ededf2;
      margin-bottom:14px;
    }

    .standings-group-title{
      font-size:1.15rem;
      font-weight:900;
      letter-spacing:-0.02em;
      margin-bottom:12px;
    }

    .standings-list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .standings-row{
      display:grid;
      grid-template-columns:28px 1fr auto;
      align-items:center;
      gap:10px;
      background:#fff;
      border:1px solid #e8e8ee;
      border-radius:18px;
      padding:10px 12px;
    }

    .standings-row.qual{
      background:#f3fff7;
    }

    .standings-row.third{
      background:#f4fbff;
    }

    .rank{
      font-weight:900;
      color:#7b7b83;
      text-align:center;
    }

    .team-inline{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .team-inline img{
      width:28px;
      height:28px;
      object-fit:cover;
      border-radius:50%;
      border:1px solid #ececf1;
      background:#fff;
      flex:0 0 auto;
    }

    .team-inline span{
      font-size:1rem;
      font-weight:700;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .pts{
      font-size:1rem;
      font-weight:900;
      color:#222;
    }

    .note-box{
      background:var(--soft);
      border-radius:24px;
      padding:20px;
      border:1px solid #ededf2;
      margin-bottom:18px;
    }

    .note-box strong{
      display:block;
      font-size:1.2rem;
      line-height:1.2;
      margin-bottom:8px;
      letter-spacing:-0.03em;
    }

    .note-box p{
      font-size:1rem;
      line-height:1.35;
      color:#2c2c2e;
      font-weight:600;
    }

    .ko-round{
      margin-top:18px;
    }

    .ko-title{
      font-size:1.2rem;
      font-weight:900;
      margin-bottom:12px;
      letter-spacing:-0.02em;
    }

    .ko-match{
      background:var(--soft);
      border-radius:24px;
      padding:18px;
      border:1px solid #ededf2;
      margin-bottom:12px;
    }

    .ko-match-label{
      font-size:1.1rem;
      font-weight:900;
      margin-bottom:12px;
    }

    .ko-buttons{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:12px;
      align-items:center;
    }

    .winner-btn{
      background:#fff;
      border:1px solid #dddde5;
      border-radius:999px;
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      min-height:58px;
      font-weight:800;
      font-size:1rem;
    }

    .winner-btn img{
      width:24px;
      height:24px;
      border-radius:50%;
      object-fit:cover;
      border:1px solid #ececf1;
    }

    .winner-btn.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    .vs{
      font-size:1.1rem;
      font-weight:900;
      color:#7b7b83;
      text-align:center;
    }

    .champion-box{
      margin-top:18px;
      background:#fff7d7;
      border:1px solid #f0df9b;
      border-radius:22px;
      padding:18px;
      text-align:center;
      font-size:1.3rem;
      font-weight:900;
    }

    .third-box{
      margin-top:12px;
      background:#f4f4f6;
      border:1px solid #e4e4ea;
      border-radius:22px;
      padding:16px;
      text-align:center;
      font-size:1.05rem;
      font-weight:800;
    }

    .hidden{
      display:none !important;
    }

    @media (max-width: 980px){
      .main-grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 640px){
      body{
        padding:12px;
      }

      .hero{
        border-radius:26px;
        padding:20px 16px 16px;
      }

      .panel,.segment-wrap{
        border-radius:24px;
        padding:14px;
      }

      .match-row{
        grid-template-columns:1fr;
        gap:12px;
      }

      .score-area{
        justify-content:center;
      }

      .ko-buttons{
        grid-template-columns:1fr;
      }

      .vs{
        display:none;
      }
    }
  </style>
</head>

          {matchNo:69, date:"JUN 27, 3:00 PM", city:"Kansas City", stadium:"Arrowhead", homeIdx:1, awayIdx:2},
          {matchNo:70, date:"JUN 27, 3:00 PM", city:"Dallas", stadium:"AT&T", homeIdx:3, awayIdx:0}
        ],
        K: [
          {matchNo:21, date:"JUN 17, 3:00 PM", city:"Houston", stadium:"NRG", homeIdx:0, awayIdx:1},
          {matchNo:23, date:"JUN 17, 8:00 PM", city:"Mexico City", stadium:"Estadio Azteca", homeIdx:2, awayIdx:3},
          {matchNo:47, date:"JUN 23, 3:00 PM", city:"Houston", stadium:"NRG", homeIdx:0, awayIdx:2},
          {matchNo:48, date:"JUN 23, 8:00 PM", city:"Guadalajara", stadium:"Estadio Akron", homeIdx:3, awayIdx:1},
          {matchNo:71, date:"JUN 27, 6:00 PM", city:"Miami", stadium:"Hard Rock", homeIdx:3, awayIdx:0},
          {matchNo:72, date:"JUN 27, 6:00 PM", city:"Atlanta", stadium:"Mercedes-Benz", homeIdx:1, awayIdx:2}
        ],
        L: [
          {matchNo:22, date:"JUN 17, 5:00 PM", city:"Toronto", stadium:"BMO", homeIdx:2, awayIdx:3},
          {matchNo:24, date:"JUN 17, 10:00 PM", city:"Dallas", stadium:"AT&T", homeIdx:0, awayIdx:1},
          {matchNo:45, date:"JUN 23, 10:00 PM", city:"Boston", stadium:"Gillette", homeIdx:0, awayIdx:2},
          {matchNo:46, date:"JUN 23, 10:00 PM", city:"Toronto", stadium:"BMO", homeIdx:3, awayIdx:1},
          {matchNo:67, date:"JUN 27, 1:00 PM", city:"New York", stadium:"MetLife", homeIdx:3, awayIdx:0},
          {matchNo:68, date:"JUN 27, 1:00 PM", city:"Philadelphia", stadium:"Lincoln Financial", homeIdx:1, awayIdx:2}
        ]
      };

      groupScores = {};
      for(const g of GROUP_KEYS){
        groupScores[g] = schedule[g].map(m => ({
          ...m,
          homeScore: 0,
          awayScore: 0,
          group: g
        }));
      }
    }

    function buildMatchesList(){
      allMatches = [];
      for(const g of GROUP_KEYS){
        for(const m of groupScores[g]) allMatches.push(m);
      }
      allMatches.sort((a,b) => a.matchNo - b.matchNo);
    }

    function dropdownOptions(selected){
      let html = "";
      for(let i=0;i<=10;i++){
        html += `<option value="${i}" ${Number(selected)===i ? "selected":""}>${i}</option>`;
      }
      return html;
    }

    function computeStandings(){
      const standings = {};

      for(const g of GROUP_KEYS){
        const stats = GROUPS[g].map((team, idx) => ({
          team,
          idx,
          played: 0,
          wins: 0,
          draws: 0,
          losses: 0,
          gf: 0,
          ga: 0,
          gd: 0,
          pts: 0
        }));

        for(const m of groupScores[g]){
          const hs = Number(m.homeScore) || 0;
          const as = Number(m.awayScore) || 0;
          const home = stats[m.homeIdx];
          const away = stats[m.awayIdx];

          home.played++;
          away.played++;
          home.gf += hs;
          home.ga += as;
          away.gf += as;
          away.ga += hs;

          if(hs > as){
            home.wins++;
            away.losses++;
            home.pts += 3;
          } else if(as > hs){
            away.wins++;
            home.losses++;
            away.pts += 3;
          } else {
            home.draws++;
            away.draws++;
            home.pts += 1;
            away.pts += 1;
          }
        }

        stats.forEach(s => s.gd = s.gf - s.ga);

        stats.sort((a,b) =>
          b.pts - a.pts ||
          b.gd - a.gd ||
          b.gf - a.gf ||
          a.team.localeCompare(b.team)
        );

        standings[g] = stats;
      }

      return standings;
    }

    function getBestThirdPlacedTeams(standings){
      const thirds = GROUP_KEYS.map(g => ({
        ...standings[g][2],
        group:g
      }));

      thirds.sort((a,b) =>
        b.pts - a.pts ||
        b.gd - a.gd ||
        b.gf - a.gf ||
        a.team.localeCompare(b.team)
      );

      return thirds.slice(0,8);
    }

    function getQualifiedTeams(standings){
      const bestThirds = getBestThirdPlacedTeams(standings);
      const bestGroups = new Set(bestThirds.map(t => t.group));
      const qualified = [];

      for(const g of GROUP_KEYS){
        qualified.push({ ...standings[g][0], group:g });
        qualified.push({ ...standings[g][1], group:g });
        if(bestGroups.has(g)){
          qualified.push({ ...standings[g][2], group:g });
        }
      }

      qualified.sort((a,b) =>
        b.pts - a.pts ||
        b.gd - a.gd ||
        b.gf - a.gf ||
        a.team.localeCompare(b.team)
      );

      return qualified;
    }

    function renderGroupTabs(){
      const holder = document.getElementById("groupTabs");
      holder.innerHTML = GROUP_KEYS.map(g => `
        <button class="group-tab ${selectedGroup===g ? 'active' : ''}" data-group="${g}">GROUP ${g}</button>
      `).join("");

      holder.querySelectorAll(".group-tab").forEach(btn => {
        btn.onclick = () => {
          selectedGroup = btn.dataset.group;
          renderGroupTabs();
          renderMatchesPanel();
          renderStandingsPanel();
        };
      });
    }

    function renderMatchesPanel(){
      const box = document.getElementById("matchesPanel");
      const matches = groupScores[selectedGroup];

      box.innerHTML = matches.map((m) => {
        const home = GROUPS[m.group][m.homeIdx];
        const away = GROUPS[m.group][m.awayIdx];
        const isCurrent = allMatches[currentMatchIdx] === m;
        return `
          <div class="match-card" style="${isCurrent ? 'outline:3px solid rgba(17,197,217,.18); border-color:#c8f0f4;' : ''}">
            <div class="match-time">${m.date}</div>
            <div class="match-row">
              <div class="team-block">
                <img class="team-flag" src="${getFlagUrl(home)}" alt="${home}">
                <div class="team-name">${home}</div>
              </div>

              <div class="score-area">
                <select class="score-box" data-match="${m.matchNo}" data-side="home">
                  ${dropdownOptions(m.homeScore)}
                </select>
                <div class="dash">-</div>
                <select class="score-box" data-match="${m.matchNo}" data-side="away">
                  ${dropdownOptions(m.awayScore)}
                </select>
              </div>

              <div class="team-block">
                <img class="team-flag" src="${getFlagUrl(away)}" alt="${away}">
                <div class="team-name">${away}</div>
              </div>
            </div>
            <div class="match-meta">Match ${m.matchNo} · ${m.city}</div>
          </div>
        `;
      }).join("");

      box.querySelectorAll(".score-box").forEach(sel => {
        sel.addEventListener("change", (e) => {
          const matchNo = Number(e.target.dataset.match);
          const side = e.target.dataset.side;
          const match = allMatches.find(x => x.matchNo === matchNo);
          if(!match) return;
          if(side === "home") match.homeScore = Number(e.target.value);
          else match.awayScore = Number(e.target.value);
          renderStandingsPanel();
          renderMatchesPanel();
        });
      });
    }

    function renderStandingsPanel(){
      const standings = computeStandings();
      const box = document.getElementById("standingsPanel");

      const bestThirds = getBestThirdPlacedTeams(standings);
      const bestThirdTeams = new Set(bestThirds.map(t => `${t.group}-${t.team}`));

      let html = "";

      for(const g of GROUP_KEYS){
        html += `
          <div class="standings-card">
            <div class="standings-group-title">GROUP ${g}</div>
            <div class="standings-list">
              ${standings[g].map((row, idx) => {
                let cls = "";
                if(idx < 2) cls = "qual";
                else if(bestThirdTeams.has(`${g}-${row.team}`)) cls = "third";

                return `
                  <div class="standings-row ${cls}">
                    <div class="rank">${idx + 1}</div>
                    <div class="team-inline">
                      <img src="${getFlagUrl(row.team)}" alt="${row.team}">
                      <span>${row.team}</span>
                    </div>
                    <div class="pts">${row.pts}</div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        `;
      }

      box.innerHTML = html;
      document.getElementById("toKnockoutBtn").classList.toggle("hidden", currentMatchIdx < allMatches.length);
    }

    function renderProgressState(){
      renderMatchesPanel();
      renderStandingsPanel();
    }

    function buildKnockout(qualified){
      const r32 = [];
      for(let i=0;i<16;i++){
        r32.push({
          matchNo:i+1,
          team1:qualified[i],
          team2:qualified[31-i],
          winner:null
        });
      }

      const r16 = Array.from({length:8}, (_,i) => ({matchNo:i+1, team1:null, team2:null, winner:null}));
      const qf = Array.from({length:4}, (_,i) => ({matchNo:i+1, team1:null, team2:null, winner:null}));
      const sf = Array.from({length:2}, (_,i) => ({matchNo:i+1, team1:null, team2:null, winner:null}));
      const third = {matchNo:1, team1:null, team2:null, winner:null};
      const final = {matchNo:1, team1:null, team2:null, winner:null};

      return {r32, r16, qf, sf, third, final};
    }

    function propagateKnockout(k){
      const winners32 = k.r32.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);

      for(let i=0;i<k.r16.length;i++){
        k.r16[i].team1 = winners32[i*2] || null;
        k.r16[i].team2 = winners32[i*2+1] || null;
        if(k.r16[i].winner && k.r16[i].winner !== k.r16[i].team1 && k.r16[i].winner !== k.r16[i].team2){
          k.r16[i].winner = null;
        }
      }

      const winners16 = k.r16.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);

      for(let i=0;i<k.qf.length;i++){
        k.qf[i].team1 = winners16[i*2] || null;
        k.qf[i].team2 = winners16[i*2+1] || null;
        if(k.qf[i].winner && k.qf[i].winner !== k.qf[i].team1 && k.qf[i].winner !== k.qf[i].team2){
          k.qf[i].winner = null;
        }
      }

      const winnersQF = k.qf.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);

      for(let i=0;i<k.sf.length;i++){
        k.sf[i].team1 = winnersQF[i*2] || null;
        k.sf[i].team2 = winnersQF[i*2+1] || null;
        if(k.sf[i].winner && k.sf[i].winner !== k.sf[i].team1 && k.sf[i].winner !== k.sf[i].team2){
          k.sf[i].winner = null;
        }
      }

      const winnersSF = k.sf.map(m => m.winner === m.team1 ? m.team1 : m.winner === m.team2 ? m.team2 : null);
      const losersSF = k.sf.map(m => {
        if(!m.team1 || !m.team2 || !m.winner) return null;
        return m.winner === m.team1 ? m.team2 : m.team1;
      });

      k.third.team1 = losersSF[0] || null;
      k.third.team2 = losersSF[1] || null;
      if(k.third.winner && k.third.winner !== k.third.team1 && k.third.winner !== k.third.team2){
        k.third.winner = null;
      }

      k.final.team1 = winnersSF[0] || null;
      k.final.team2 = winnersSF[1] || null;
      if(k.final.winner && k.final.winner !== k.final.team1 && k.final.winner !== k.final.team2){
        k.final.winner = null;
      }
    }

    function renderSingleKoMatch(m, round, idx){
      return `
        <div class="ko-match">
          <div class="ko-match-label">Match ${m.matchNo}</div>
          <div class="ko-buttons">
            <button class="winner-btn ${m.winner === m.team1 ? 'active' : ''}" data-round="${round}" data-idx="${idx}" data-choice="1">
              ${m.team1 ? `<img src="${getFlagUrl(m.team1.team)}" alt="${m.team1.team}"><span>${m.team1.team}</span>` : '<span>—</span>'}
            </button>
            <div class="vs">VS</div>
            <button class="winner-btn ${m.winner === m.team2 ? 'active' : ''}" data-round="${round}" data-idx="${idx}" data-choice="2">
              ${m.team2 ? `<img src="${getFlagUrl(m.team2.team)}" alt="${m.team2.team}"><span>${m.team2.team}</span>` : '<span>—</span>'}
            </button>
          </div>
        </div>
      `;
    }

    function renderKnockoutUI(){
      const k = knockoutData;
      const panel = document.getElementById("knockoutPanel");

      panel.innerHTML = `
        <div class="ko-round">
          <div class="ko-title">Round of 32</div>
          ${k.r32.map((m,i) => renderSingleKoMatch(m,"R32",i)).join("")}
        </div>

        <div class="ko-round">
          <div class="ko-title">Round of 16</div>
          ${k.r16.map((m,i) => renderSingleKoMatch(m,"R16",i)).join("")}
        </div>

        <div class="ko-round">
          <div class="ko-title">Quarter-finals</div>
          ${k.qf.map((m,i) => renderSingleKoMatch(m,"QF",i)).join("")}
        </div>

        <div class="ko-round">
          <div class="ko-title">Semi-finals</div>
          ${k.sf.map((m,i) => renderSingleKoMatch(m,"SF",i)).join("")}
        </div>

        <div class="ko-round">
          <div class="ko-title">Third Place</div>
          ${renderSingleKoMatch(k.third,"THIRD",0)}
        </div>

        <div class="ko-round">
          <div class="ko-title">Final</div>
          ${renderSingleKoMatch(k.final,"FINAL",0)}
        </div>

        ${k.final.winner ? `<div class="champion-box">🏆 Champion: ${k.final.winner.team}</div>` : ""}
        ${k.third.winner ? `<div class="third-box">Third Place: ${k.third.winner.team}</div>` : ""}
      `;

      panel.querySelectorAll(".winner-btn").forEach(btn => {
        btn.onclick = () => {
          const round = btn.dataset.round;
          const idx = Number(btn.dataset.idx);
          const choice = Number(btn.dataset.choice);
          let target = null;

          if(round === "R32") target = knockoutData.r32[idx];
          if(round === "R16") target = knockoutData.r16[idx];
          if(round === "QF") target = knockoutData.qf[idx];
          if(round === "SF") target = knockoutData.sf[idx];
          if(round === "THIRD") target = knockoutData.third;
          if(round === "FINAL") target = knockoutData.final;

          if(!target) return;
          const selected = choice === 1 ? target.team1 : target.team2;
          if(!selected) return;

          target.winner = selected;
          propagateKnockout(knockoutData);
          renderKnockoutUI();
        };
      });
    }

    function goToKnockout(){
      const standings = computeStandings();
      const qualified = getQualifiedTeams(standings);
      const bestThirds = getBestThirdPlacedTeams(standings);

      if(qualified.length !== 32){
        alert(`Only ${qualified.length} teams qualified. Need exactly 32.`);
        return;
      }

      knockoutData = buildKnockout(qualified);
      propagateKnockout(knockoutData);

      document.getElementById("groupStageView").classList.add("hidden");
      document.getElementById("knockoutView").classList.remove("hidden");

      document.getElementById("bestThirdsPanel").innerHTML = `
        <strong>Best 8 third-placed teams (advanced)</strong>
        <p>${bestThirds.map(t => `${t.team} (${t.group}) · ${t.pts} pts`).join(" · ")}</p>
      `;

      renderKnockoutUI();
    }

    function initButtons(){
      document.getElementById("nextMatchBtn").onclick = () => {
        if(currentMatchIdx < allMatches.length){
          currentMatchIdx++;
          if(currentMatchIdx < allMatches.length){
            selectedGroup = allMatches[currentMatchIdx].group;
          }
          renderGroupTabs();
          renderProgressState();
        }
      };

      document.getElementById("backMatchBtn").onclick = () => {
        if(currentMatchIdx > 0){
          currentMatchIdx--;
          selectedGroup = allMatches[currentMatchIdx].group;
          renderGroupTabs();
          renderProgressState();
        }
      };

      document.getElementById("randomResultBtn").onclick = () => {
        if(currentMatchIdx < allMatches.length){
          const m = allMatches[currentMatchIdx];
          m.homeScore = Math.floor(Math.random() * 6);
          m.awayScore = Math.floor(Math.random() * 6);
          renderProgressState();
        }
      };

      document.getElementById("autoCompleteBtn").onclick = () => {
        for(let i=currentMatchIdx;i<allMatches.length;i++){
          allMatches[i].homeScore = Math.floor(Math.random() * 5);
          allMatches[i].awayScore = Math.floor(Math.random() * 5);
        }
        currentMatchIdx = allMatches.length;
        renderProgressState();
      };

      document.getElementById("resetBtn").onclick = () => {
        buildFullSchedule();
        buildMatchesList();
        currentMatchIdx = 0;
        selectedGroup = "A";
        knockoutData = null;
        document.getElementById("groupStageView").classList.remove("hidden");
        document.getElementById("knockoutView").classList.add("hidden");
        renderGroupTabs();
        renderProgressState();
      };

      document.getElementById("toKnockoutBtn").onclick = goToKnockout;

      document.getElementById("backToGroupsBtn").onclick = () => {
        document.getElementById("knockoutView").classList.add("hidden");
        document.getElementById("groupStageView").classList.remove("hidden");
      };

      document.getElementById("classicModeBtn").onclick = () => {
        document.getElementById("classicModeBtn").classList.add("active");
        document.getElementById("bracketModeBtn").classList.remove("active");
        document.getElementById("groupStageView").classList.remove("hidden");
        document.getElementById("knockoutView").classList.add("hidden");
      };

      document.getElementById("bracketModeBtn").onclick = () => {
        document.getElementById("bracketModeBtn").classList.add("active");
        document.getElementById("classicModeBtn").classList.remove("active");
        if(currentMatchIdx >= allMatches.length){
          goToKnockout();
        } else {
          alert("Complete the group stage first.");
        }
      };
    }

    buildFullSchedule();
    buildMatchesList();
    initButtons();
    renderGroupTabs();
    renderProgressState();
  </script>
</body>
</html>
